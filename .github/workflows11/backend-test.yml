name: Backend Tests

on:
  workflow_dispatch:
  repository_dispatch:
    types: [source-updated]

jobs:
  test:
    name: Python Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: readzen
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: readzen_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout source from readzen
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://readzen:testpass@localhost:5432/readzen_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-ci-only
          JWT_SECRET: test-jwt-secret-ci-only
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source from readzen
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: |
          cd backend
          ruff check . --output-format=github || true
