name: Output Keystore B64

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'TRIGGER_OUTPUT_KEYSTORE'

permissions:
  issues: write
  contents: read

jobs:
  output-keystore:
    name: Generate Keystore & Post to Issue
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set up Java for keytool
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate stable keystore
        run: |
          keytool -genkeypair \
            -alias readzen-release \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -keystore /tmp/readzen.keystore \
            -storepass readzen2024 \
            -keypass readzen2024 \
            -dname "CN=ReadZen CI, OU=Dev, O=ReadZen, L=SF, ST=CA, C=US" \
            -noprompt
          ls -la /tmp/readzen.keystore
          keytool -list -keystore /tmp/readzen.keystore -storepass readzen2024
          echo "KEYSTORE_B64=$(base64 -w 0 /tmp/readzen.keystore)" >> $GITHUB_ENV
          echo "Keystore generated and encoded"

      - name: Post keystore B64 to issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const b64 = process.env.KEYSTORE_B64;
            const body = [
              "## Keystore B64 Output",
              "",
              "**Generated by**: output-keystore workflow",
              "**Run ID**: ${{ github.run_id }}",
              "**Alias**: readzen-release | **storepass/keypass**: readzen2024",
              "",
              "```",
              b64,
              "```",
              "",
              "> Copy the base64 string above and commit to android/keystore/readzen.keystore.b64"
            ].join("\n");
            await github.rest.issues.createComment({
              owner: "readori",
              repo: "readzen-ci",
              issue_number: 5,
              body
            });
            console.log("Posted keystore B64 to issue #5");
