name: Build Diagnostic

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-diagnostic.yml'
      - 'TRIGGER_DIAG'
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  diagnose:
    name: Diagnostic Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source from readzen
        id: checkout_src
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}
          persist-credentials: false

      - name: Report checkout failure
        if: steps.checkout_src.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: 'readori', repo: 'readzen-ci', issue_number: 1,
              body: `## ❌ CHECKOUT FAILED\n\nRun: ${context.runId}\nDate: ${new Date().toISOString()}\n\nThe READZEN_PAT secret may be expired or invalid. Please update it.\n\nCheckout outcome: ${context.job}`
            });

      - name: Abort if checkout failed
        if: steps.checkout_src.outcome == 'failure'
        run: exit 1

      - name: Checkout CI repo
        uses: actions/checkout@v4
        with:
          path: ci-repo
          token: ${{ secrets.READZEN_PAT }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        id: setup_gradle
        continue-on-error: true
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Fallback Gradle install
        if: steps.setup_gradle.outcome == 'failure'
        run: |
          echo "Gradle action failed, installing manually..."
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o gradle.zip || {
            echo "Gradle CDN failed, trying mirror..."
            curl -sL "https://downloads.gradle-dn.com/distributions/gradle-8.5-bin.zip" -o gradle.zip
          }
          unzip -q gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Debug APK
        id: build
        working-directory: android
        continue-on-error: true
        timeout-minutes: 20
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build.log
          echo "BUILD SUCCEEDED"

      - name: Post build results to issue
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            
            let logContent = '';
            const logPath = path.join(process.env.GITHUB_WORKSPACE, 'android', 'build.log');
            
            if (fs.existsSync(logPath)) {
              const fullLog = fs.readFileSync(logPath, 'utf8');
              const lines = fullLog.split('\n');
              
              // Extract error lines
              const errorLines = lines.filter(l => 
                /^e:|error:|Error:|FAILURE|Unresolved reference|Cannot find|not found|Expecting|Overload resolution|None of the following|Type mismatch|Conflicting|illegal|incompatible|duplicate|missing/.test(l)
              ).slice(0, 100);
              
              // Last 400 lines
              const tailLines = lines.slice(-400);
              
              logContent = `### Error Lines\n\`\`\`\n${errorLines.join('\n') || 'No error patterns matched'}\n\`\`\`\n\n### Last 400 Lines\n\`\`\`\n${tailLines.join('\n')}\n\`\`\``;
            } else {
              logContent = '⚠️ build.log not found - build may not have started';
            }
            
            const buildOutcome = '${{ steps.build.outcome }}';
            const emoji = buildOutcome === 'success' ? '✅' : '❌';
            
            // Check for APK
            let apkInfo = '';
            try {
              const { execSync } = require('child_process');
              const apk = execSync('find android/app/build/outputs/apk/debug -name "*.apk" 2>/dev/null || true').toString().trim();
              if (apk) apkInfo = `\n**APK:** ${apk}`;
            } catch(e) {}
            
            const body = `## ${emoji} Build Diagnostic Report\n\n**Run:** [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n**Date:** ${new Date().toISOString()}\n**Build outcome:** ${buildOutcome}\n**Checkout:** ${{ steps.checkout_src.outcome }}\n**Gradle setup:** ${{ steps.setup_gradle.outcome }}${apkInfo}\n\n${logContent}`;
            
            // Truncate to 65000 chars (GitHub limit)
            const truncated = body.length > 64000 ? body.substring(0, 64000) + '\n\n... (truncated)' : body;
            
            await github.rest.issues.createComment({
              owner: 'readori', repo: 'readzen-ci', issue_number: 1,
              body: truncated
            });

      - name: Write build report file
        if: always()
        run: |
          BUILD_LOG="android/build.log"
          {
            echo "# Build Diagnostic Report"
            echo ""
            echo "**Run:** ${{ github.run_id }}"
            echo "**Date:** $(date -u)"
            echo "**Build outcome:** ${{ steps.build.outcome }}"
            echo ""
            if [ "${{ steps.build.outcome }}" = "failure" ]; then
              echo "## ❌ BUILD FAILED"
              echo '```'
              if [ -f "$BUILD_LOG" ]; then
                grep -E "^e:|error:|Error:|FAILURE|Unresolved reference|Cannot find|not found|Expecting|Type mismatch" "$BUILD_LOG" | head -120 || true
              fi
              echo '```'
              echo ""
              echo "### Last 500 Lines"
              echo '```'
              [ -f "$BUILD_LOG" ] && tail -500 "$BUILD_LOG" || echo "build.log not found"
              echo '```'
            else
              echo "## ✅ BUILD SUCCEEDED"
            fi
          } > ci-repo/BUILD_ERRORS.md 2>/dev/null || true

      - name: Commit build report
        if: always()
        working-directory: ci-repo
        run: |
          git config user.name "CI Bot"
          git config user.email "ci@readzen.app"
          git add BUILD_ERRORS.md 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "ci: build diagnostic report [skip ci]"
            git push origin main || echo "Push failed - check PAT permissions"
          }
