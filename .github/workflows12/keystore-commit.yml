name: Keystore Commit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'TRIGGER_KEYSTORE_COMMIT'

jobs:
  commit-keystore:
    name: Generate & Commit Keystore to readzen
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout readzen-ci (for script)
        uses: actions/checkout@v4

      - name: Set up Java for keytool
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -alias readzen-release \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -keystore /tmp/readzen.keystore \
            -storepass readzen2024 \
            -keypass readzen2024 \
            -dname "CN=ReadZen CI, OU=Dev, O=ReadZen, L=SF, ST=CA, C=US" \
            -noprompt
          ls -la /tmp/readzen.keystore
          echo "Keystore generated OK"

      - name: Commit keystore to readzen via GitHub API
        env:
          READZEN_PAT: ${{ secrets.READZEN_PAT }}
        run: python3 .github/scripts/commit_keystore.py
