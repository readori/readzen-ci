name: Cloudflare Infrastructure Setup

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'status'
        type: choice
        options:
          - status
          - init-schema

jobs:
  setup:
    name: Cloudflare Infrastructure
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout source from readzen
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler v4
        run: npm install -g wrangler@4

      - name: Verify Auth
        run: wrangler whoami

      - name: List Resources
        if: inputs.action == 'status'
        run: |
          echo "=== D1 Databases ==="
          wrangler d1 list || echo "None"
          echo ""
          echo "=== KV Namespaces ==="
          wrangler kv namespace list || echo "None"
          echo ""
          echo "=== Workers ==="
          wrangler deployments list || echo "None"

      - name: Initialize D1 Schema
        if: inputs.action == 'init-schema'
        working-directory: cloudflare-backend
        run: |
          npm install
          npx wrangler d1 execute readzen-db --file=schema.sql --remote
          echo "✅ D1 schema initialized"
