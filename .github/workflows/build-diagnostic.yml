name: Build Diagnostic

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-diagnostic.yml'
      - 'TRIGGER_DIAG'
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  diagnose:
    name: Diagnostic Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source from readzen
        uses: actions/checkout@v6
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}
          persist-credentials: false

      - name: Checkout CI repo
        uses: actions/checkout@v6
        with:
          path: ci-repo
          token: ${{ secrets.READZEN_PAT }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Debug APK
        id: build
        working-directory: android
        continue-on-error: true
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          BUILD_EXIT=$?
          echo "build_exit=$BUILD_EXIT" >> $GITHUB_OUTPUT
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "BUILD FAILED with exit code $BUILD_EXIT"
            exit 1
          fi

      - name: Write build report
        if: always()
        run: |
          BUILD_LOG="android/build.log"
          {
            echo "# Build Diagnostic Report"
            echo ""
            echo "**Run:** ${{ github.run_id }}"
            echo "**Date:** $(date -u)"
            echo "**Build outcome:** ${{ steps.build.outcome }}"
            echo ""

            if [ "${{ steps.build.outcome }}" = "failure" ]; then
              echo "## ❌ BUILD FAILED"
              echo ""
              echo "### Compilation Errors"
              echo '```'
              if [ -f "$BUILD_LOG" ]; then
                grep -E "^e:|error:|Error:|FAILURE|Unresolved reference|Cannot find|not found|Expecting|Overload resolution|None of the following|Type mismatch|Conflicting|illegal|incompatible|duplicate|missing" "$BUILD_LOG" | head -120 || echo "No error pattern matches found"
              else
                echo "build.log not found"
              fi
              echo '```'
              echo ""
              echo "### Last 500 Lines of Build Log"
              echo '```'
              if [ -f "$BUILD_LOG" ]; then
                tail -500 "$BUILD_LOG" || true
              else
                echo "build.log not found"
              fi
              echo '```'
            else
              echo "## ✅ BUILD SUCCEEDED"
              echo ""
              APK_PATH=$(find android/app/build/outputs/apk/debug -name '*.apk' 2>/dev/null | head -1)
              if [ -n "$APK_PATH" ]; then
                APK_SIZE=$(stat -c%s "$APK_PATH")
                echo "**APK:** $APK_PATH ($APK_SIZE bytes)"
              else
                echo "**Warning:** No APK found despite success exit code"
                echo ""
                echo "### Build Log (last 200 lines)"
                echo '```'
                if [ -f "$BUILD_LOG" ]; then
                  tail -200 "$BUILD_LOG" || true
                fi
                echo '```'
              fi
            fi
          } > ci-repo/BUILD_ERRORS.md

      - name: Commit build report
        if: always()
        working-directory: ci-repo
        run: |
          git config user.name "CI Bot"
          git config user.email "ci@readzen.app"
          git add BUILD_ERRORS.md
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "ci: build diagnostic report [skip ci]"
            git push origin main
          }
