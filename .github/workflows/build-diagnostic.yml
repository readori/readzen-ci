name: Build Diagnostic

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-diagnostic.yml'
      - 'TRIGGER_DIAG'
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  diagnose:
    name: Diagnostic Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source from readzen
        uses: actions/checkout@v6
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}
          persist-credentials: false

      - name: Checkout CI repo
        uses: actions/checkout@v6
        with:
          path: ci-repo
          token: ${{ secrets.READZEN_PAT }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Debug APK
        id: build
        working-directory: android
        continue-on-error: true
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Write error report
        if: steps.build.outcome == 'failure'
        run: |
          {
            echo "# Build Diagnostic Report"
            echo ""
            echo "**Run:** ${{ github.run_id }}"
            echo "**Date:** $(date -u)"
            echo ""
            echo "## Compilation Errors"
            echo '```'
            grep -E "^e:|error:|Error:|FAILURE|Unresolved reference|Cannot find|not found|Expecting|Overload resolution|None of the following|Type mismatch|Conflicting|illegal|incompatible|duplicate|missing|w:|warning:" android/build.log | head -120 || echo "No grep matches found"
            echo '```'
            echo ""
            echo "## Last 300 Lines of Build Log"
            echo '```'
            tail -300 android/build.log || true
            echo '```'
          } > ci-repo/BUILD_ERRORS.md

      - name: Commit error report
        if: steps.build.outcome == 'failure'
        working-directory: ci-repo
        run: |
          git config user.name "CI Bot"
          git config user.email "ci@readzen.app"
          git add BUILD_ERRORS.md
          git commit -m "ci: build error report [skip ci]" || true
          git push origin main || true

      - name: Write success report
        if: steps.build.outcome == 'success'
        run: |
          {
            echo "# Build Diagnostic Report"
            echo ""
            echo "## ✅ BUILD SUCCEEDED"
            echo ""
            echo "**Run:** ${{ github.run_id }}"
            echo "**Date:** $(date -u)"
            APK_PATH=$(find android/app/build/outputs/apk/debug -name '*.apk' 2>/dev/null | head -1)
            if [ -n "$APK_PATH" ]; then
              APK_SIZE=$(stat -c%s "$APK_PATH")
              echo "**APK:** $APK_PATH ($APK_SIZE bytes)"
            fi
          } > ci-repo/BUILD_ERRORS.md

      - name: Commit success report
        if: steps.build.outcome == 'success'
        working-directory: ci-repo
        run: |
          git config user.name "CI Bot"
          git config user.email "ci@readzen.app"
          git add BUILD_ERRORS.md
          git commit -m "ci: build succeeded [skip ci]" || true
          git push origin main || true
