name: Python Backend Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Deployment action'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy             # Pull latest code and restart containers
          - migrate-db         # Run DB create_all (safe, idempotent)
          - full-deploy        # Pull + migrate + restart
      environment:
        description: 'Target environment'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEPLOY_ACTION: ${{ inputs.action || 'deploy' }}
  DEPLOY_ENV: ${{ inputs.environment || 'production' }}

jobs:
  deploy-python-backend:
    name: Deploy Python FastAPI Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Validate secrets
        run: |
          echo "=== Validating required secrets ==="
          MISSING=0
          if [ -z "${{ secrets.BACKEND_SSH_HOST }}" ]; then
            echo "❌ BACKEND_SSH_HOST is not set"
            MISSING=1
          else
            echo "✅ BACKEND_SSH_HOST is set"
          fi
          if [ -z "${{ secrets.BACKEND_SSH_USER }}" ]; then
            echo "❌ BACKEND_SSH_USER is not set"
            MISSING=1
          else
            echo "✅ BACKEND_SSH_USER is set"
          fi
          if [ -z "${{ secrets.BACKEND_SSH_KEY }}" ]; then
            echo "❌ BACKEND_SSH_KEY (private key) is not set"
            MISSING=1
          else
            echo "✅ BACKEND_SSH_KEY is set"
          fi
          if [ -z "${{ secrets.READZEN_PAT }}" ]; then
            echo "❌ READZEN_PAT is not set"
            MISSING=1
          else
            echo "✅ READZEN_PAT is set"
          fi
          if [ "$MISSING" = "1" ]; then
            echo ""
            echo "Required secrets:"
            echo "  BACKEND_SSH_HOST  — hostname/IP of the production server"
            echo "  BACKEND_SSH_USER  — SSH username (e.g. deploy)"
            echo "  BACKEND_SSH_KEY   — SSH private key (RSA/ED25519)"
            echo "  READZEN_PAT       — GitHub PAT with repo:read access"
            exit 1
          fi

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.BACKEND_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.BACKEND_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          echo "✅ Host fingerprint added"

      - name: Deploy — Pull & Restart
        if: env.DEPLOY_ACTION == 'deploy' || env.DEPLOY_ACTION == 'full-deploy'
        env:
          SSH_HOST: ${{ secrets.BACKEND_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKEND_SSH_USER }}
          READZEN_PAT: ${{ secrets.READZEN_PAT }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          DATABASE_URL: ${{ secrets.BACKEND_DATABASE_URL }}
          REDIS_URL: ${{ secrets.BACKEND_REDIS_URL }}
          SECRET_KEY: ${{ secrets.BACKEND_SECRET_KEY }}
          JWT_SECRET: ${{ secrets.BACKEND_JWT_SECRET }}
        run: |
          ssh "${SSH_USER}@${SSH_HOST}" bash -s << 'SSHEOF'
            set -e
            REPO_DIR="${HOME}/readzen"

            echo "=== Pulling latest source ==="
            if [ -d "${REPO_DIR}" ]; then
              cd "${REPO_DIR}"
              git fetch origin codex/readzen
              git checkout codex/readzen
              git pull origin codex/readzen
            else
              git clone https://x-access-token:${READZEN_PAT}@github.com/readori/readzen.git "${REPO_DIR}" --branch codex/readzen
              cd "${REPO_DIR}"
            fi

            echo "=== Updating .env ==="
            cd "${REPO_DIR}/backend"
            cat > .env << ENVEOF
          DATABASE_URL=${DATABASE_URL}
          REDIS_URL=${REDIS_URL}
          SECRET_KEY=${SECRET_KEY}
          JWT_SECRET=${JWT_SECRET}
          ADMIN_API_KEY=${ADMIN_API_KEY}
          REQUIRE_INVITE_CODE=false
          APP_VERSION=1.4.0
          ENVEOF

            echo "=== Rebuilding and restarting containers ==="
            docker compose pull || true
            docker compose build --no-cache api
            docker compose up -d --remove-orphans
            echo "✅ Containers restarted"
          SSHEOF

      - name: Migrate DB — create_all (safe, idempotent)
        if: env.DEPLOY_ACTION == 'migrate-db' || env.DEPLOY_ACTION == 'full-deploy'
        env:
          SSH_HOST: ${{ secrets.BACKEND_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKEND_SSH_USER }}
        run: |
          ssh "${SSH_USER}@${SSH_HOST}" bash -s << 'SSHEOF'
            set -e
            cd "${HOME}/readzen/backend"
            echo "=== Running DB migration (SQLAlchemy create_all) ==="
            docker compose exec -T api python - << 'PYEOF'
          import asyncio
          from app.db.database import engine, Base
          import app.models.models  # ensure all models are imported

          async def run():
              async with engine.begin() as conn:
                  await conn.run_sync(Base.metadata.create_all)
              print("✅ create_all complete — all tables up to date")

          asyncio.run(run())
          PYEOF
          SSHEOF

      - name: Verify deployment
        continue-on-error: true
        env:
          SSH_HOST: ${{ secrets.BACKEND_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKEND_SSH_USER }}
        run: |
          echo "Waiting 15s for containers to be healthy..."
          sleep 15
          HTTP_CODE=$(ssh "${SSH_USER}@${SSH_HOST}" \
            "curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/health 2>/dev/null || echo 000")
          echo "Health check: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Python backend is healthy"
            echo "## ✅ Python Backend Deployment" >> $GITHUB_STEP_SUMMARY
            echo "**Status:** Live" >> $GITHUB_STEP_SUMMARY
          else
            echo "::warning::Health check returned HTTP $HTTP_CODE — check server logs"
            echo "## ⚠️ Python Backend Deployment" >> $GITHUB_STEP_SUMMARY
            echo "**Health check:** HTTP $HTTP_CODE — may still be starting up" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**Action:** ${{ env.DEPLOY_ACTION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ env.DEPLOY_ENV }}" >> $GITHUB_STEP_SUMMARY

      - name: Post deployment report
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const action = '${{ env.DEPLOY_ACTION }}';
            const env = '${{ env.DEPLOY_ENV }}';
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            try {
              await github.rest.issues.createComment({
                owner: 'readori', repo: 'readzen-ci', issue_number: 2,
                body: [
                  `## ${emoji} Python Backend Deploy`,
                  '',
                  `**Status:** ${status}`,
                  `**Action:** ${action}`,
                  `**Environment:** ${env}`,
                  `**Date:** ${new Date().toISOString()}`,
                  `**Run:** [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                ].join('\n'),
              });
            } catch (e) {
              core.warning(`Could not post report: ${e.message}`);
            }
