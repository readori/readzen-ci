name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'TRIGGER_DEPLOY'
  workflow_dispatch:
    inputs:
      action:
        description: 'Deployment action'
        required: true
        default: 'full-setup-and-deploy'
        type: choice
        options:
          - setup-resources
          - deploy
          - full-setup-and-deploy
          - migrate-db

permissions:
  contents: write
  issues: write

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-backend:
    name: Deploy Cloudflare Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DEPLOY_ACTION: ${{ inputs.action || 'full-setup-and-deploy' }}
    steps:
      - name: Validate credentials
        run: |
          echo "=== Credential Validation ==="
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "❌ CLOUDFLARE_ACCOUNT_ID secret is NOT set!"
            exit 1
          fi
          echo "✅ CLOUDFLARE_ACCOUNT_ID is set (length: ${#CLOUDFLARE_ACCOUNT_ID})"

          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN secret is NOT set!"
            exit 1
          fi
          echo "✅ CLOUDFLARE_API_TOKEN is set (length: ${#CLOUDFLARE_API_TOKEN})"

          echo ""
          echo "=== Testing Token Validity ==="
          VERIFY=$(curl -s -w "\n%{http_code}" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          HTTP_CODE=$(echo "$VERIFY" | tail -1)
          BODY=$(echo "$VERIFY" | sed '$d')
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Token verification failed! Token may be invalid or expired."
            exit 1
          fi
          echo "✅ Token is valid!"

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: cloudflare-backend
        run: npm install

      - name: Create D1 Database
        if: env.DEPLOY_ACTION == 'setup-resources' || env.DEPLOY_ACTION == 'full-setup-and-deploy'
        id: create_d1
        run: |
          set +e
          echo "=== Creating D1 Database ==="

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"readzen-db"}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP: $HTTP_CODE"
          echo "Body: $BODY"

          SUCCESS=$(echo "$BODY" | jq -r '.success // "false"' 2>/dev/null)

          if [ "$SUCCESS" = "true" ]; then
            DB_ID=$(echo "$BODY" | jq -r '.result.uuid')
            echo "d1_id=$DB_ID" >> $GITHUB_OUTPUT
            echo "✅ D1 created: $DB_ID"
          else
            echo "Creation returned non-success, checking if already exists..."
            LIST_RESP=$(curl -s -w "\n%{http_code}" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
            LIST_HTTP=$(echo "$LIST_RESP" | tail -1)
            LIST_BODY=$(echo "$LIST_RESP" | sed '$d')
            echo "List HTTP: $LIST_HTTP"
            echo "List Body: $LIST_BODY"

            DB_ID=$(echo "$LIST_BODY" | jq -r '[.result[] | select(.name=="readzen-db")][0].uuid // empty' 2>/dev/null)
            if [ -n "$DB_ID" ] && [ "$DB_ID" != "null" ]; then
              echo "d1_id=$DB_ID" >> $GITHUB_OUTPUT
              echo "ℹ️ D1 already exists: $DB_ID"
            else
              echo "❌ Cannot create or find D1 database"
              exit 1
            fi
          fi

      - name: Create KV Namespace
        if: env.DEPLOY_ACTION == 'setup-resources' || env.DEPLOY_ACTION == 'full-setup-and-deploy'
        id: create_kv
        run: |
          set +e
          echo "=== Creating KV Namespace ==="

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"title":"readzen-kv"}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP: $HTTP_CODE"
          echo "Body: $BODY"

          SUCCESS=$(echo "$BODY" | jq -r '.success // "false"' 2>/dev/null)

          if [ "$SUCCESS" = "true" ]; then
            KV_ID=$(echo "$BODY" | jq -r '.result.id')
            echo "kv_id=$KV_ID" >> $GITHUB_OUTPUT
            echo "✅ KV created: $KV_ID"
          else
            echo "Creation returned non-success, checking if already exists..."
            LIST_RESP=$(curl -s -w "\n%{http_code}" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
            LIST_HTTP=$(echo "$LIST_RESP" | tail -1)
            LIST_BODY=$(echo "$LIST_RESP" | sed '$d')
            echo "List HTTP: $LIST_HTTP"
            echo "List Body: $LIST_BODY"

            KV_ID=$(echo "$LIST_BODY" | jq -r '[.result[] | select(.title=="readzen-kv")][0].id // empty' 2>/dev/null)
            if [ -n "$KV_ID" ] && [ "$KV_ID" != "null" ]; then
              echo "kv_id=$KV_ID" >> $GITHUB_OUTPUT
              echo "ℹ️ KV already exists: $KV_ID"
            else
              echo "❌ Cannot create or find KV namespace"
              exit 1
            fi
          fi

      - name: Get existing resource IDs
        if: env.DEPLOY_ACTION == 'deploy'
        id: get_ids
        run: |
          D1_RESP=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          DB_ID=$(echo "$D1_RESP" | jq -r '[.result[] | select(.name=="readzen-db")][0].uuid // empty' 2>/dev/null)

          KV_RESP=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          KV_ID=$(echo "$KV_RESP" | jq -r '[.result[] | select(.title=="readzen-kv")][0].id // empty' 2>/dev/null)

          if [ -z "$DB_ID" ] || [ "$DB_ID" = "null" ] || [ -z "$KV_ID" ] || [ "$KV_ID" = "null" ]; then
            echo "❌ Resources not found. Run full-setup-and-deploy first."
            exit 1
          fi
          echo "d1_id=$DB_ID" >> $GITHUB_OUTPUT
          echo "kv_id=$KV_ID" >> $GITHUB_OUTPUT

      - name: Resolve resource IDs
        id: resources
        run: |
          D1_ID="${{ steps.create_d1.outputs.d1_id }}${{ steps.get_ids.outputs.d1_id }}"
          KV_ID="${{ steps.create_kv.outputs.kv_id }}${{ steps.get_ids.outputs.kv_id }}"
          echo "d1_id=$D1_ID" >> $GITHUB_OUTPUT
          echo "kv_id=$KV_ID" >> $GITHUB_OUTPUT
          echo "✅ Resolved — D1: $D1_ID | KV: $KV_ID"

      - name: Generate wrangler.toml
        working-directory: cloudflare-backend
        env:
          D1_ID: ${{ steps.resources.outputs.d1_id }}
          KV_ID: ${{ steps.resources.outputs.kv_id }}
        run: |
          echo 'name = "readzen-api"' > wrangler.toml
          echo 'main = "src/index.ts"' >> wrangler.toml
          echo 'compatibility_date = "2024-12-01"' >> wrangler.toml
          echo 'compatibility_flags = ["nodejs_compat"]' >> wrangler.toml
          echo 'workers_dev = true' >> wrangler.toml
          echo '' >> wrangler.toml
          echo '[[d1_databases]]' >> wrangler.toml
          echo 'binding = "DB"' >> wrangler.toml
          echo 'database_name = "readzen-db"' >> wrangler.toml
          echo "database_id = \"${D1_ID}\"" >> wrangler.toml
          echo '' >> wrangler.toml
          echo '[[kv_namespaces]]' >> wrangler.toml
          echo 'binding = "KV"' >> wrangler.toml
          echo "id = \"${KV_ID}\"" >> wrangler.toml
          echo '' >> wrangler.toml
          echo '[vars]' >> wrangler.toml
          echo 'APP_NAME = "ReadZen API"' >> wrangler.toml
          echo 'APP_VERSION = "2.0.0"' >> wrangler.toml
          echo 'CORS_ORIGINS = "https://readzen.app,https://admin.readzen.app"' >> wrangler.toml
          echo 'JWT_ALGORITHM = "HS256"' >> wrangler.toml
          echo 'JWT_EXPIRE_MINUTES = "1440"' >> wrangler.toml
          echo 'RATE_LIMIT_PER_MINUTE = "60"' >> wrangler.toml
          echo ""
          echo "=== Generated wrangler.toml ==="
          cat wrangler.toml

      - name: Run D1 migrations
        if: env.DEPLOY_ACTION == 'setup-resources' || env.DEPLOY_ACTION == 'full-setup-and-deploy' || env.DEPLOY_ACTION == 'migrate-db'
        working-directory: cloudflare-backend
        run: |
          echo "Running schema migration..."
          npx wrangler d1 execute readzen-db --remote --file=./schema.sql
          echo "✅ Database schema applied"

      - name: Set Worker secrets
        if: env.DEPLOY_ACTION == 'setup-resources' || env.DEPLOY_ACTION == 'full-setup-and-deploy'
        working-directory: cloudflare-backend
        env:
          STRIPE_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WH: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          PP_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PP_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
        run: |
          JWT_SECRET=$(openssl rand -hex 32)
          echo "$JWT_SECRET" | npx wrangler secret put JWT_SECRET

          SECRET_KEY=$(openssl rand -hex 24)
          echo "$SECRET_KEY" | npx wrangler secret put SECRET_KEY

          echo "## 🔐 Deployment Secrets" >> $GITHUB_STEP_SUMMARY
          echo "**SECRET_KEY** (admin bootstrap): \`$SECRET_KEY\`" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ Save this! POST /api/v1/admin/bootstrap" >> $GITHUB_STEP_SUMMARY

          if [ -n "$STRIPE_KEY" ]; then
            echo "$STRIPE_KEY" | npx wrangler secret put STRIPE_SECRET_KEY
            echo "✅ STRIPE_SECRET_KEY set"
          fi
          if [ -n "$STRIPE_WH" ]; then
            echo "$STRIPE_WH" | npx wrangler secret put STRIPE_WEBHOOK_SECRET
            echo "✅ STRIPE_WEBHOOK_SECRET set"
          fi
          if [ -n "$PP_ID" ]; then
            echo "$PP_ID" | npx wrangler secret put PAYPAL_CLIENT_ID
            echo "✅ PAYPAL_CLIENT_ID set"
          fi
          if [ -n "$PP_SECRET" ]; then
            echo "$PP_SECRET" | npx wrangler secret put PAYPAL_CLIENT_SECRET
            echo "✅ PAYPAL_CLIENT_SECRET set"
          fi

      - name: Deploy Worker
        if: env.DEPLOY_ACTION == 'deploy' || env.DEPLOY_ACTION == 'full-setup-and-deploy'
        id: deploy
        working-directory: cloudflare-backend
        run: |
          echo "Deploying readzen-api worker..."
          DEPLOY_OUTPUT=$(npx wrangler deploy --minify 2>&1)
          echo "$DEPLOY_OUTPUT"
          WORKER_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[^\s]+\.workers\.dev' | head -1)
          if [ -n "$WORKER_URL" ]; then
            echo "worker_url=$WORKER_URL" >> $GITHUB_OUTPUT
            echo "✅ Worker deployed at: $WORKER_URL"
          else
            echo "worker_url=https://readzen-api.readori.workers.dev" >> $GITHUB_OUTPUT
            echo "✅ Worker deployed (URL from wrangler output not captured)"
          fi

      - name: Configure Custom Domain
        if: env.DEPLOY_ACTION == 'full-setup-and-deploy'
        env:
          CNAME_DOMAIN: ${{ secrets.CNAME_HTTPS }}
        run: |
          if [ -n "$CNAME_DOMAIN" ]; then
            echo "Setting custom domain: $CNAME_DOMAIN"
            DOMAIN_ROOT=$(echo "$CNAME_DOMAIN" | rev | cut -d. -f1-2 | rev)
            ZONE_RESULT=$(curl -s \
              "https://api.cloudflare.com/client/v4/zones?name=${DOMAIN_ROOT}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
            ZONE_ID=$(echo "$ZONE_RESULT" | jq -r '.result[0].id // empty')
            if [ -n "$ZONE_ID" ] && [ "$ZONE_ID" != "null" ]; then
              curl -s -X POST \
                "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/workers/routes" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"pattern\": \"${CNAME_DOMAIN}/*\", \"script\": \"readzen-api\"}"
              echo "✅ Worker route set for $CNAME_DOMAIN"
            else
              echo "⚠️ Zone not found for $DOMAIN_ROOT — using workers.dev URL"
            fi
          else
            echo "ℹ️ No CNAME_HTTPS secret — using workers.dev"
          fi

      - name: Verify deployment
        if: env.DEPLOY_ACTION == 'deploy' || env.DEPLOY_ACTION == 'full-setup-and-deploy'
        continue-on-error: true
        run: |
          WORKER_URL="${{ steps.deploy.outputs.worker_url }}"
          echo "Worker URL: $WORKER_URL"
          echo "Waiting 20s for propagation..."
          sleep 20

          echo "=== Health Check ==="
          HTTP_CODE=$(curl -s -o /tmp/resp.json -w "%{http_code}" "${WORKER_URL}/" || echo "000")
          echo "HTTP Status: $HTTP_CODE"
          cat /tmp/resp.json 2>/dev/null
          echo ""

          echo "=== Config Check ==="
          HTTP_CODE2=$(curl -s -o /tmp/config.json -w "%{http_code}" "${WORKER_URL}/api/v1/config/public" || echo "000")
          echo "Config HTTP: $HTTP_CODE2"
          cat /tmp/config.json 2>/dev/null
          echo ""

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Worker is LIVE and responding!"
          else
            echo "⚠️ Worker returned HTTP $HTTP_CODE"
            echo "Check Cloudflare Dashboard > Workers > readzen-api for logs"
            echo "Worker may need workers.dev subdomain enabled in account settings"
          fi

      - name: Post deployment report
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const d1 = '${{ steps.resources.outputs.d1_id }}' || 'N/A';
            const kv = '${{ steps.resources.outputs.kv_id }}' || 'N/A';
            const workerUrl = '${{ steps.deploy.outputs.worker_url }}' || 'https://readzen-api.readori.workers.dev';
            const action = '${{ env.DEPLOY_ACTION }}';
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '⚠️';
            const body = [
              `## ${emoji} Backend Deployment Report`,
              '',
              `**Status:** ${status}`,
              `**Action:** ${action}`,
              `**Date:** ${new Date().toISOString()}`,
              `**Run:** [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              '',
              '### Resources',
              '| Resource | ID |',
              '|---|---|',
              `| D1 Database | \`${d1}\` |`,
              `| KV Namespace | \`${kv}\` |`,
              `| Worker URL | \`${workerUrl}\` |`,
              '',
              '### Endpoints',
              `- Health: \`${workerUrl}/\``,
              `- API: \`${workerUrl}/api/v1/\``,
              `- Admin: \`${workerUrl}/admin\``,
              `- Config: \`GET ${workerUrl}/api/v1/config/public\``,
              `- Bootstrap: \`POST ${workerUrl}/api/v1/admin/bootstrap\``,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: 'readori', repo: 'readzen-ci', issue_number: 1, body
            });
