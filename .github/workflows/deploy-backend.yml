name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'TRIGGER_DEPLOY'
  workflow_dispatch:
    inputs:
      action:
        description: 'Deployment action'
        required: true
        default: 'full-setup-and-deploy'
        type: choice
        options:
          - setup-resources
          - deploy
          - full-setup-and-deploy
          - migrate-db

permissions:
  contents: write
  issues: write

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-backend:
    name: Deploy Cloudflare Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DEPLOY_ACTION: ${{ inputs.action || 'full-setup-and-deploy' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: cloudflare-backend
        run: npm install

      - name: Create D1 Database
        if: env.DEPLOY_ACTION == 'setup-resources' || env.DEPLOY_ACTION == 'full-setup-and-deploy'
        id: create_d1
        run: |
          echo "Creating D1 database..."
          RESULT=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"name": "readzen-db"}')
          SUCCESS=$(echo "$RESULT" | jq -r '.success')
          if [ "$SUCCESS" = "true" ]; then
            DB_ID=$(echo "$RESULT" | jq -r '.result.uuid')
            echo "d1_id=$DB_ID" >> $GITHUB_OUTPUT
            echo "✅ D1 Database created: $DB_ID"
          else
            EXISTING=$(curl -s \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
            DB_ID=$(echo "$EXISTING" | jq -r '[.result[] | select(.name=="readzen-db")][0].uuid // empty')
            if [ -n "$DB_ID" ] && [ "$DB_ID" != "null" ]; then
              echo "d1_id=$DB_ID" >> $GITHUB_OUTPUT
              echo "ℹ️ D1 already exists: $DB_ID"
            else
              echo "❌ Failed to create D1: $RESULT"
              exit 1
            fi
          fi

      - name: Create KV Namespace
        if: env.DEPLOY_ACTION == 'setup-resources' || env.DEPLOY_ACTION == 'full-setup-and-deploy'
        id: create_kv
        run: |
          echo "Creating KV namespace..."
          RESULT=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"title": "readzen-kv"}')
          SUCCESS=$(echo "$RESULT" | jq -r '.success')
          if [ "$SUCCESS" = "true" ]; then
            KV_ID=$(echo "$RESULT" | jq -r '.result.id')
            echo "kv_id=$KV_ID" >> $GITHUB_OUTPUT
            echo "✅ KV Namespace created: $KV_ID"
          else
            EXISTING=$(curl -s \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
            KV_ID=$(echo "$EXISTING" | jq -r '[.result[] | select(.title=="readzen-kv")][0].id // empty')
            if [ -n "$KV_ID" ] && [ "$KV_ID" != "null" ]; then
              echo "kv_id=$KV_ID" >> $GITHUB_OUTPUT
              echo "ℹ️ KV already exists: $KV_ID"
            else
              echo "❌ Failed to create KV: $RESULT"
              exit 1
            fi
          fi

      - name: Get existing resource IDs
        if: env.DEPLOY_ACTION == 'deploy'
        id: get_ids
        run: |
          D1_RESULT=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          DB_ID=$(echo "$D1_RESULT" | jq -r '[.result[] | select(.name=="readzen-db")][0].uuid // empty')
          KV_RESULT=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          KV_ID=$(echo "$KV_RESULT" | jq -r '[.result[] | select(.title=="readzen-kv")][0].id // empty')
          if [ -z "$DB_ID" ] || [ "$DB_ID" = "null" ] || [ -z "$KV_ID" ] || [ "$KV_ID" = "null" ]; then
            echo "❌ Resources not found. Run full-setup-and-deploy first."
            exit 1
          fi
          echo "d1_id=$DB_ID" >> $GITHUB_OUTPUT
          echo "kv_id=$KV_ID" >> $GITHUB_OUTPUT

      - name: Resolve resource IDs
        id: resources
        run: |
          D1_ID="${{ steps.create_d1.outputs.d1_id }}${{ steps.get_ids.outputs.d1_id }}"
          KV_ID="${{ steps.create_kv.outputs.kv_id }}${{ steps.get_ids.outputs.kv_id }}"
          echo "d1_id=$D1_ID" >> $GITHUB_OUTPUT
          echo "kv_id=$KV_ID" >> $GITHUB_OUTPUT
          echo "Resolved — D1: $D1_ID | KV: $KV_ID"

      - name: Generate wrangler.toml
        working-directory: cloudflare-backend
        env:
          D1_ID: ${{ steps.resources.outputs.d1_id }}
          KV_ID: ${{ steps.resources.outputs.kv_id }}
        run: |
          echo 'name = "readzen-api"' > wrangler.toml
          echo 'main = "src/index.ts"' >> wrangler.toml
          echo 'compatibility_date = "2024-12-01"' >> wrangler.toml
          echo 'compatibility_flags = ["nodejs_compat"]' >> wrangler.toml
          echo '' >> wrangler.toml
          echo '[[d1_databases]]' >> wrangler.toml
          echo 'binding = "DB"' >> wrangler.toml
          echo 'database_name = "readzen-db"' >> wrangler.toml
          echo "database_id = \"${D1_ID}\"" >> wrangler.toml
          echo '' >> wrangler.toml
          echo '[[kv_namespaces]]' >> wrangler.toml
          echo 'binding = "KV"' >> wrangler.toml
          echo "id = \"${KV_ID}\"" >> wrangler.toml
          echo '' >> wrangler.toml
          echo '[vars]' >> wrangler.toml
          echo 'APP_NAME = "ReadZen API"' >> wrangler.toml
          echo 'APP_VERSION = "2.0.0"' >> wrangler.toml
          echo 'CORS_ORIGINS = "https://readzen.app,https://admin.readzen.app"' >> wrangler.toml
          echo 'JWT_ALGORITHM = "HS256"' >> wrangler.toml
          echo 'JWT_EXPIRE_MINUTES = "1440"' >> wrangler.toml
          echo 'RATE_LIMIT_PER_MINUTE = "60"' >> wrangler.toml
          echo '' >> wrangler.toml
          echo '[env.dev]' >> wrangler.toml
          echo 'name = "readzen-api-dev"' >> wrangler.toml
          echo '[env.dev.vars]' >> wrangler.toml
          echo 'CORS_ORIGINS = "http://localhost:3000,http://localhost:8787"' >> wrangler.toml
          echo "✅ wrangler.toml generated:"
          cat wrangler.toml

      - name: Run D1 migrations
        if: env.DEPLOY_ACTION == 'setup-resources' || env.DEPLOY_ACTION == 'full-setup-and-deploy' || env.DEPLOY_ACTION == 'migrate-db'
        working-directory: cloudflare-backend
        run: |
          echo "Running schema migration..."
          npx wrangler d1 execute readzen-db --remote --file=./schema.sql
          echo "✅ Database schema applied"

      - name: Set Worker secrets
        if: env.DEPLOY_ACTION == 'setup-resources' || env.DEPLOY_ACTION == 'full-setup-and-deploy'
        working-directory: cloudflare-backend
        env:
          STRIPE_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WH: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          PP_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PP_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
        run: |
          JWT_SECRET=$(openssl rand -hex 32)
          echo "$JWT_SECRET" | npx wrangler secret put JWT_SECRET
          SECRET_KEY=$(openssl rand -hex 24)
          echo "$SECRET_KEY" | npx wrangler secret put SECRET_KEY
          echo "## 🔐 Deployment Secrets" >> $GITHUB_STEP_SUMMARY
          echo "**SECRET_KEY** (admin bootstrap): \`$SECRET_KEY\`" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ Save this! POST /api/v1/admin/bootstrap" >> $GITHUB_STEP_SUMMARY
          if [ -n "$STRIPE_KEY" ]; then
            echo "$STRIPE_KEY" | npx wrangler secret put STRIPE_SECRET_KEY
          fi
          if [ -n "$STRIPE_WH" ]; then
            echo "$STRIPE_WH" | npx wrangler secret put STRIPE_WEBHOOK_SECRET
          fi
          if [ -n "$PP_ID" ]; then
            echo "$PP_ID" | npx wrangler secret put PAYPAL_CLIENT_ID
          fi
          if [ -n "$PP_SECRET" ]; then
            echo "$PP_SECRET" | npx wrangler secret put PAYPAL_CLIENT_SECRET
          fi

      - name: Deploy Worker
        if: env.DEPLOY_ACTION == 'deploy' || env.DEPLOY_ACTION == 'full-setup-and-deploy'
        working-directory: cloudflare-backend
        run: |
          echo "Deploying readzen-api worker..."
          npx wrangler deploy --minify
          echo "✅ Worker deployed!"

      - name: Configure Custom Domain
        if: env.DEPLOY_ACTION == 'full-setup-and-deploy'
        env:
          CNAME_DOMAIN: ${{ secrets.CNAME_HTTPS }}
        run: |
          if [ -n "$CNAME_DOMAIN" ]; then
            echo "Setting custom domain: $CNAME_DOMAIN"
            DOMAIN_ROOT=$(echo "$CNAME_DOMAIN" | rev | cut -d. -f1-2 | rev)
            ZONE_RESULT=$(curl -s \
              "https://api.cloudflare.com/client/v4/zones?name=${DOMAIN_ROOT}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
            ZONE_ID=$(echo "$ZONE_RESULT" | jq -r '.result[0].id // empty')
            if [ -n "$ZONE_ID" ] && [ "$ZONE_ID" != "null" ]; then
              curl -s -X POST \
                "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/workers/routes" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "{\"pattern\": \"${CNAME_DOMAIN}/*\", \"script\": \"readzen-api\"}"
              echo "✅ Worker route set for $CNAME_DOMAIN"
            else
              echo "⚠️ Zone not found — use workers.dev URL"
            fi
          else
            echo "ℹ️ No CNAME_HTTPS — using workers.dev"
          fi

      - name: Verify deployment
        if: env.DEPLOY_ACTION == 'deploy' || env.DEPLOY_ACTION == 'full-setup-and-deploy'
        run: |
          sleep 8
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://readzen-api.readori.workers.dev/" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Worker is live! (HTTP 200)"
            curl -s "https://readzen-api.readori.workers.dev/" | jq .
          else
            echo "⚠️ HTTP $HTTP_CODE — may need propagation time"
          fi

      - name: Post deployment report
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const d1 = '${{ steps.resources.outputs.d1_id }}' || 'N/A';
            const kv = '${{ steps.resources.outputs.kv_id }}' || 'N/A';
            const action = '${{ env.DEPLOY_ACTION }}';
            const body = [
              '## 🚀 Backend Deployment Report',
              '',
              `**Action:** ${action}`,
              `**Date:** ${new Date().toISOString()}`,
              `**Run:** [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              '',
              '### Resources',
              '| Resource | ID |',
              '|---|---|',
              `| D1 Database | \`${d1}\` |`,
              `| KV Namespace | \`${kv}\` |`,
              '| Worker | readzen-api |',
              '',
              '### Endpoints',
              '- Health: `https://readzen-api.readori.workers.dev/`',
              '- API: `https://readzen-api.readori.workers.dev/api/v1/`',
              '- Admin: `https://readzen-api.readori.workers.dev/admin`',
              '- Config: `GET /api/v1/config/public`',
              '- Bootstrap: `POST /api/v1/admin/bootstrap`'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: 'readori', repo: 'readzen-ci', issue_number: 1, body
            });
