name: Android Build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'TRIGGER_DEPLOY'
      - 'TRIGGER_DIAG'
      - '*.md'
      - '.github/workflows/deploy-backend.yml'
      - '.github/workflows/build-diagnostic.yml'
      - '.github/workflows/keystore-init.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  repository_dispatch:
    types: [source-updated]

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify-caller:
    name: Verify Authorized Caller
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check caller permissions
        run: |
          echo "Triggered by: ${{ github.actor }}"
          echo "Event: ${{ github.event_name }}"
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "::error::Workflow can only run from main branch"
            exit 1
          fi

  build-debug:
    name: Build Debug APK
    needs: verify-caller
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      status: ${{ steps.report.outputs.status }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup persistent keystore
        shell: bash {0}
        run: |
          mkdir -p $HOME/.android
          KEYSTORE_PATH="$HOME/.android/readzen-ci.keystore"
          if [ -n "${{ secrets.CI_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.CI_KEYSTORE_BASE64 }}" | base64 -d > "$KEYSTORE_PATH"
            echo "✅ Keystore decoded from secret (consistent signature)"
          else
            echo "⚠️ CI_KEYSTORE_BASE64 secret not set — generating fresh keystore"
            echo "⚠️ APKs will NOT be installable over previous versions!"
            keytool -genkeypair \
              -alias readzen-ci -keyalg RSA -keysize 2048 -validity 36500 \
              -keystore "$KEYSTORE_PATH" \
              -storepass readzen2024 -keypass readzen2024 \
              -dname "CN=ReadZen CI, OU=Dev, O=ReadZen, L=SF, ST=CA, C=US"
          fi
          echo "CI_KEYSTORE_PATH=$KEYSTORE_PATH" >> $GITHUB_ENV

      - name: Setup Gradle
        id: setup_gradle
        continue-on-error: true
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Fallback Gradle install
        if: steps.setup_gradle.outcome == 'failure'
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o gradle.zip || \
          curl -sL "https://downloads.gradle-dn.com/distributions/gradle-8.5-bin.zip" -o gradle.zip
          unzip -q gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Debug APK
        id: build
        working-directory: android
        shell: bash {0}
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          EXIT=${PIPESTATUS[0]}
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT
          if [ $EXIT -ne 0 ]; then
            echo "ERRORS:" >> build-errors.txt
            grep -E "^e:|error:|FAILURE|Unresolved" build.log | head -30 >> build-errors.txt 2>/dev/null || true
            echo "---TAIL---" >> build-errors.txt
            tail -30 build.log >> build-errors.txt 2>/dev/null || true
          fi
          exit $EXIT

      - name: Verify and upload APK
        if: success()
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk/debug -name '*.apk' | head -1)
          if [ -z "$APK" ]; then exit 1; fi
          SIZE=$(stat -c%s "$APK")
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "✅ APK: $APK ($((SIZE/1024)) KB)"

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: readzen-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
          overwrite: true

      - name: Report result
        id: report
        if: always()
        shell: bash {0}
        run: |
          if [ "${{ steps.build.outputs.exit_code }}" = "0" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: android/build*.log
          retention-days: 1

  build-release:
    name: Build Release APK
    needs: verify-caller
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      status: ${{ steps.report.outputs.status }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup persistent keystore
        shell: bash {0}
        run: |
          mkdir -p $HOME/.android
          KEYSTORE_PATH="$HOME/.android/readzen-ci.keystore"
          if [ -n "${{ secrets.CI_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.CI_KEYSTORE_BASE64 }}" | base64 -d > "$KEYSTORE_PATH"
            echo "✅ Keystore decoded from secret (consistent signature)"
          else
            echo "⚠️ CI_KEYSTORE_BASE64 secret not set — generating fresh keystore"
            echo "⚠️ APKs will NOT be installable over previous versions!"
            keytool -genkeypair \
              -alias readzen-ci -keyalg RSA -keysize 2048 -validity 36500 \
              -keystore "$KEYSTORE_PATH" \
              -storepass readzen2024 -keypass readzen2024 \
              -dname "CN=ReadZen CI, OU=Dev, O=ReadZen, L=SF, ST=CA, C=US"
          fi
          echo "CI_KEYSTORE_PATH=$KEYSTORE_PATH" >> $GITHUB_ENV

      - name: Setup Gradle
        id: setup_gradle
        continue-on-error: true
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Fallback Gradle install
        if: steps.setup_gradle.outcome == 'failure'
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o gradle.zip || \
          curl -sL "https://downloads.gradle-dn.com/distributions/gradle-8.5-bin.zip" -o gradle.zip
          unzip -q gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Release APK
        id: build
        working-directory: android
        shell: bash {0}
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log
          EXIT=${PIPESTATUS[0]}
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT
          if [ $EXIT -ne 0 ]; then
            echo "ERRORS:" >> build-errors.txt
            grep -E "^e:|error:|FAILURE|Unresolved" build.log | head -30 >> build-errors.txt 2>/dev/null || true
            echo "---TAIL---" >> build-errors.txt
            tail -30 build.log >> build-errors.txt 2>/dev/null || true
          fi
          exit $EXIT

      - name: Verify and upload APK
        if: success()
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$APK" ]; then exit 1; fi
          SIZE=$(stat -c%s "$APK")
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "✅ APK: $APK ($((SIZE/1024)) KB)"

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: readzen-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7
          overwrite: true

      - name: Report result
        id: report
        if: always()
        shell: bash {0}
        run: |
          if [ "${{ steps.build.outputs.exit_code }}" = "0" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-logs
          path: android/build*.log
          retention-days: 1

  post-results:
    name: Post Build Results
    needs: [build-debug, build-release]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post to Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const debugStatus = "${{ needs.build-debug.result }}";
            const releaseStatus = "${{ needs.build-release.result }}";
            const debugEmoji = debugStatus === 'success' ? '✅' : '❌';
            const releaseEmoji = releaseStatus === 'success' ? '✅' : '❌';
            const body = [
              "## Android Build Report",
              "",
              `| Build | Status |`,
              `|-------|--------|`,
              `| Debug | ${debugEmoji} ${debugStatus} |`,
              `| Release | ${releaseEmoji} ${releaseStatus} |`,
              "",
              `**Run:** [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              `**Date:** ${new Date().toISOString()}`,
            ].join("\n");
            await github.rest.issues.createComment({
              owner: "readori",
              repo: "readzen-ci",
              issue_number: 1,
              body
            });

  lint-android:
    name: Android Lint
    needs: verify-caller
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        id: setup_gradle
        continue-on-error: true
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Fallback Gradle install
        if: steps.setup_gradle.outcome == 'failure'
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o gradle.zip || \
          curl -sL "https://downloads.gradle-dn.com/distributions/gradle-8.5-bin.zip" -o gradle.zip
          unzip -q gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Run Android Lint
        working-directory: android
        run: ./gradlew lint --no-daemon || true

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: android/app/build/reports/lint*.html
          retention-days: 1
