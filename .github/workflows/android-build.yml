name: Android Build

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [source-updated]

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source from readzen
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Grant Gradle wrapper permissions
        working-directory: android
        run: chmod +x gradlew || true

      - name: Build Debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace --info 2>&1 | tail -500
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: readzen-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-logs
          path: |
            android/app/build/reports/
            android/app/build/outputs/logs/
          retention-days: 7

  lint-android:
    name: Android Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source from readzen
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Run Android Lint
        working-directory: android
        run: gradle lint --no-daemon || true

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: android/app/build/reports/lint*.html
          retention-days: 14
