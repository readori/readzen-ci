name: Android Build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'TRIGGER_DEPLOY'
      - 'TRIGGER_DIAG'
      - '*.md'
      - '.github/workflows/deploy-backend.yml'
      - '.github/workflows/build-diagnostic.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  repository_dispatch:
    types: [source-updated]

permissions:
  contents: read
  actions: read

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify-caller:
    name: Verify Authorized Caller
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check caller permissions
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_EVENT: ${{ github.event_name }}
          GH_REF: ${{ github.ref }}
        run: |
          echo "Triggered by: $GH_ACTOR"
          echo "Event: $GH_EVENT"
          echo "Ref: $GH_REF"
          if [[ "$GH_REF" != "refs/heads/main" ]]; then
            echo "::error::Workflow can only run from main branch"
            exit 1
          fi

  build-debug:
    name: Build Debug APK
    needs: verify-caller
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source from readzen
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore cached keystore
        id: cache-keystore
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: ~/.android/readzen-ci.keystore
          key: readzen-debug-keystore-v1

      - name: Generate keystore if needed
        run: |
          if [ ! -f "$HOME/.android/readzen-ci.keystore" ]; then
            echo "Keystore not found (cache miss or service down), generating..."
            mkdir -p $HOME/.android
            keytool -genkeypair \
              -alias readzen-debug \
              -keyalg RSA \
              -keysize 2048 \
              -validity 36500 \
              -keystore "$HOME/.android/readzen-ci.keystore" \
              -storepass readzen2024 \
              -keypass readzen2024 \
              -dname "CN=ReadZen CI, OU=Development, O=ReadZen, L=Unknown, ST=Unknown, C=US"
            echo "✅ New keystore generated"
          else
            echo "✅ Keystore restored from cache"
          fi

      - name: Set keystore path
        run: |
          echo "CI_KEYSTORE_PATH=$HOME/.android/readzen-ci.keystore" >> $GITHUB_ENV

      - name: Setup Gradle
        id: setup_gradle
        continue-on-error: true
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Fallback Gradle install
        if: steps.setup_gradle.outcome == 'failure'
        run: |
          echo "⚠️ Gradle action failed, installing manually..."
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o gradle.zip || \
          curl -sL "https://downloads.gradle-dn.com/distributions/gradle-8.5-bin.zip" -o gradle.zip
          unzip -q gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH
          echo "✅ Gradle 8.5 installed manually"

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Debug APK
        id: debug_build
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build-debug.log
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          CI_KEYSTORE_PATH: ${{ env.CI_KEYSTORE_PATH }}

      - name: Extract build errors on failure
        if: failure() && steps.debug_build.outcome == 'failure'
        working-directory: android
        run: |
          echo "## 🔴 Debug Build Failed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "^e:|error:|Error:|FAILURE|Unresolved reference|Cannot find|not found" build-debug.log | head -80 >> $GITHUB_STEP_SUMMARY || echo "No specific errors found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "### Last 100 Lines" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 build-debug.log >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Verify APK exists
        working-directory: android
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name '*.apk' 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No debug APK found!"
            exit 1
          fi
          APK_SIZE=$(stat -c%s "$APK_PATH")
          echo "✅ Debug APK: $APK_PATH ($(($APK_SIZE / 1024)) KB)"
          echo "## ✅ Debug APK Built" >> $GITHUB_STEP_SUMMARY
          echo "Size: $(($APK_SIZE / 1024 / 1024)) MB" >> $GITHUB_STEP_SUMMARY

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: readzen-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
          overwrite: true

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-failure-logs
          path: |
            android/build-debug.log
            android/app/build/reports/
          retention-days: 1

  build-release:
    name: Build Release APK
    needs: verify-caller
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source from readzen
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore cached keystore
        id: cache-keystore
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: ~/.android/readzen-ci.keystore
          key: readzen-debug-keystore-v1

      - name: Generate keystore if needed
        run: |
          if [ ! -f "$HOME/.android/readzen-ci.keystore" ]; then
            echo "Keystore not found, generating..."
            mkdir -p $HOME/.android
            keytool -genkeypair \
              -alias readzen-debug \
              -keyalg RSA \
              -keysize 2048 \
              -validity 36500 \
              -keystore "$HOME/.android/readzen-ci.keystore" \
              -storepass readzen2024 \
              -keypass readzen2024 \
              -dname "CN=ReadZen CI, OU=Development, O=ReadZen, L=Unknown, ST=Unknown, C=US"
            echo "✅ New keystore generated"
          else
            echo "✅ Keystore restored from cache"
          fi

      - name: Set keystore path
        run: |
          echo "CI_KEYSTORE_PATH=$HOME/.android/readzen-ci.keystore" >> $GITHUB_ENV

      - name: Setup Gradle
        id: setup_gradle
        continue-on-error: true
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Fallback Gradle install
        if: steps.setup_gradle.outcome == 'failure'
        run: |
          echo "⚠️ Gradle action failed, installing manually..."
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o gradle.zip || \
          curl -sL "https://downloads.gradle-dn.com/distributions/gradle-8.5-bin.zip" -o gradle.zip
          unzip -q gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH
          echo "✅ Gradle 8.5 installed manually"

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Release APK
        id: release_build
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build-release.log
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          CI_KEYSTORE_PATH: ${{ env.CI_KEYSTORE_PATH }}

      - name: Extract build errors on failure
        if: failure() && steps.release_build.outcome == 'failure'
        working-directory: android
        run: |
          echo "## 🔴 Release Build Failed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "^e:|error:|Error:|FAILURE|Unresolved reference|Cannot find|not found" build-release.log | head -80 >> $GITHUB_STEP_SUMMARY || echo "No specific errors found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "### Last 100 Lines" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 build-release.log >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Verify APK exists
        working-directory: android
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name '*.apk' 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No release APK found!"
            exit 1
          fi
          APK_SIZE=$(stat -c%s "$APK_PATH")
          echo "✅ Release APK: $APK_PATH ($(($APK_SIZE / 1024)) KB)"
          echo "## ✅ Release APK Built" >> $GITHUB_STEP_SUMMARY
          echo "Size: $(($APK_SIZE / 1024 / 1024)) MB" >> $GITHUB_STEP_SUMMARY

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: readzen-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7
          overwrite: true

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-failure-logs
          path: |
            android/build-release.log
            android/app/build/reports/
          retention-days: 1

  lint-android:
    name: Android Lint
    needs: verify-caller
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source from readzen
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        id: setup_gradle
        continue-on-error: true
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Fallback Gradle install
        if: steps.setup_gradle.outcome == 'failure'
        run: |
          echo "⚠️ Gradle action failed, installing manually..."
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o gradle.zip || \
          curl -sL "https://downloads.gradle-dn.com/distributions/gradle-8.5-bin.zip" -o gradle.zip
          unzip -q gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH
          echo "✅ Gradle 8.5 installed manually"

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Run Android Lint
        working-directory: android
        run: ./gradlew lint --no-daemon || true

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: android/app/build/reports/lint*.html
          retention-days: 1
