name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true

permissions:
  contents: read
  actions: read

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source from readzen
        uses: actions/checkout@v6
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Release APK
        working-directory: android
        run: |
          set -o pipefail
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build-release.log
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}

      - name: Verify APK exists
        working-directory: android
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name '*.apk' 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No release APK found!"
            exit 1
          fi
          APK_SIZE=$(stat -c%s "$APK_PATH")
          echo "✅ Release APK: $APK_PATH ($APK_SIZE bytes)"
          echo "APK_NAME=readzen-${{ github.event.inputs.version }}.apk" >> $GITHUB_ENV

      - name: Upload Release APK
        uses: actions/upload-artifact@v7
        with:
          name: readzen-release-${{ github.event.inputs.version }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-build-failure-logs
          path: |
            android/build-release.log
            android/app/build/reports/
          retention-days: 3

  typescript-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout source from readzen
        uses: actions/checkout@v6
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install & Type Check
        working-directory: cloudflare-backend
        run: |
          npm install
          npx tsc --noEmit
