name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source from readzen
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build Release APK
        working-directory: android
        run: gradle assembleRelease --no-daemon --stacktrace
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: readzen-release-${{ github.event.inputs.version }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90

  cloudflare-test:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source from readzen
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Type Check
        working-directory: cloudflare-backend
        run: |
          npm install
          npx tsc --noEmit
