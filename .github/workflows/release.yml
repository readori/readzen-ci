name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true

permissions:
  contents: read
  actions: read

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source from readzen
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        id: setup_gradle
        continue-on-error: true
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Fallback Gradle install
        if: steps.setup_gradle.outcome == 'failure'
        run: |
          echo "Gradle action failed, installing manually..."
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o gradle.zip || {
            echo "Gradle CDN failed, trying mirror..."
            curl -sL "https://downloads.gradle-dn.com/distributions/gradle-8.5-bin.zip" -o gradle.zip
          }
          unzip -q gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Setup Keystore
        run: |
          # Priority 1: repo-committed stable keystore
          if [ -f "android/keystore/readzen.keystore.b64" ]; then
            base64 -d android/keystore/readzen.keystore.b64 > /tmp/readzen.keystore
            echo "CI_KEYSTORE_PATH=/tmp/readzen.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_ALIAS=readzen-release" >> $GITHUB_ENV
            echo "CI_KEYSTORE_PASSWORD=readzen2024" >> $GITHUB_ENV
            echo "CI_KEY_PASSWORD=readzen2024" >> $GITHUB_ENV
            echo "✅ Using repo-committed stable keystore"
          # Priority 2: secret-provided keystore
          elif [ -n "${{ secrets.CI_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.CI_KEYSTORE_BASE64 }}" | base64 -d > /tmp/readzen.keystore
            echo "CI_KEYSTORE_PATH=/tmp/readzen.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_ALIAS=readzen-release" >> $GITHUB_ENV
            KSTORE_PASS="${{ secrets.CI_KEYSTORE_PASSWORD }}"
            echo "CI_KEYSTORE_PASSWORD=${KSTORE_PASS:-readzen2024}" >> $GITHUB_ENV
            echo "CI_KEY_PASSWORD=${KSTORE_PASS:-readzen2024}" >> $GITHUB_ENV
            echo "✅ Using CI_KEYSTORE_BASE64 secret keystore"
          else
            echo "⚠️ No stable keystore — generating temporary one"
            keytool -genkeypair -alias readzen-release -keyalg RSA -keysize 2048 -validity 36500 \
              -keystore /tmp/readzen.keystore -storepass readzen2024 -keypass readzen2024 \
              -dname "CN=ReadZen CI, OU=Dev, O=ReadZen, L=SF, ST=CA, C=US" -noprompt
            echo "CI_KEYSTORE_PATH=/tmp/readzen.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_ALIAS=readzen-release" >> $GITHUB_ENV
            echo "CI_KEYSTORE_PASSWORD=readzen2024" >> $GITHUB_ENV
            echo "CI_KEY_PASSWORD=readzen2024" >> $GITHUB_ENV
            echo "⚠️ Temporary keystore generated — replace with stable keystore before publishing"
          fi

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Release APK
        working-directory: android
        run: |
          set -o pipefail
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build-release.log
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}

      - name: Verify APK exists
        working-directory: android
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name '*.apk' 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No release APK found!"
            exit 1
          fi
          APK_SIZE=$(stat -c%s "$APK_PATH")
          echo "✅ Release APK: $APK_PATH ($APK_SIZE bytes)"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: readzen-release-${{ github.event.inputs.version }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-build-failure-logs
          path: |
            android/build-release.log
            android/app/build/reports/
          retention-days: 3

  typescript-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout source from readzen
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install & Type Check
        working-directory: cloudflare-backend
        run: |
          npm install
          npx tsc --noEmit
