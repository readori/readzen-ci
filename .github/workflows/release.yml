name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build Release APK
        working-directory: android
        run: gradle assembleRelease --no-daemon --stacktrace
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: readzen-release-${{ github.ref_name || github.event.inputs.version }}
          path: |
            android/app/build/outputs/apk/release/*.apk
          retention-days: 90

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd backend
          docker build -t readzen-api:${{ github.ref_name || 'latest' }} .

      - name: Save Docker image
        run: |
          docker save readzen-api:${{ github.ref_name || 'latest' }} | gzip > readzen-api.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ github.ref_name || 'latest' }}
          path: readzen-api.tar.gz
          retention-days: 30
