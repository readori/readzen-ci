name: Cloudflare Deploy

on:
  workflow_dispatch:
  repository_dispatch:
    types: [source-updated]

permissions:
  contents: read
  actions: read

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify-caller:
    name: Verify Authorized Caller
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check caller permissions
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_REF: ${{ github.ref }}
        run: |
          echo "Triggered by: $GH_ACTOR"
          if [[ "$GH_REF" != "refs/heads/main" ]]; then
            echo "::error::Deploy only allowed from main branch"
            exit 1
          fi

  deploy:
    name: Provision & Deploy to Cloudflare Workers
    needs: verify-caller
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout source from readzen
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Provision D1 Database via API
        id: d1
        run: |
          EXISTING=$(curl -sf \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/d1/database" \
            | jq -r '[.result[] | select(.name=="readzen-db")][0].uuid // empty')
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            D1_ID="$EXISTING"
            echo "Found existing D1: $D1_ID"
          else
            RESP=$(curl -sf -X POST \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"readzen-db"}' \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/d1/database")
            D1_ID=$(echo "$RESP" | jq -r '.result.uuid')
            echo "Created D1: $D1_ID"
          fi
          if [ -z "$D1_ID" ] || [ "$D1_ID" = "null" ]; then
            echo "::error::Failed to get D1 database ID"
            exit 1
          fi
          echo "::add-mask::$D1_ID"
          echo "d1_id=$D1_ID" >> $GITHUB_OUTPUT

      - name: Provision KV Namespace via API
        id: kv
        run: |
          EXISTING=$(curl -sf \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces" \
            | jq -r '[.result[] | select(.title=="readzen-kv")][0].id // empty')
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            KV_ID="$EXISTING"
            echo "Found existing KV: $KV_ID"
          else
            RESP=$(curl -sf -X POST \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"title":"readzen-kv"}' \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces")
            KV_ID=$(echo "$RESP" | jq -r '.result.id')
            echo "Created KV: $KV_ID"
          fi
          if [ -z "$KV_ID" ] || [ "$KV_ID" = "null" ]; then
            echo "::error::Failed to get KV namespace ID"
            exit 1
          fi
          echo "::add-mask::$KV_ID"
          echo "kv_id=$KV_ID" >> $GITHUB_OUTPUT

      - name: Generate wrangler.toml
        working-directory: cloudflare-backend
        env:
          D1_ID: ${{ steps.d1.outputs.d1_id }}
          KV_ID: ${{ steps.kv.outputs.kv_id }}
          CNAME_DOMAIN: ${{ secrets.CNAME_HTTPS }}
        run: |
          cat > wrangler.toml << EOF
          name = "readzen-api"
          main = "src/index.ts"
          compatibility_date = "2024-12-01"
          compatibility_flags = ["nodejs_compat"]
          workers_dev = true

          [[d1_databases]]
          binding = "DB"
          database_name = "readzen-db"
          database_id = "${D1_ID}"

          [[kv_namespaces]]
          binding = "KV"
          id = "${KV_ID}"

          [vars]
          APP_NAME = "ReadZen API"
          APP_VERSION = "2.3.0"
          CORS_ORIGINS = "https://web.heiqiba.com,https://readzen-api.iilove.workers.dev"
          JWT_ALGORITHM = "HS256"
          JWT_EXPIRE_MINUTES = "1440"
          RATE_LIMIT_PER_MINUTE = "60"
          EOF

          # Remove leading whitespace left by heredoc indentation
          sed -i 's/^          //' wrangler.toml

          # Add custom domain route if CNAME_HTTPS secret is set
          if [ -n "$CNAME_DOMAIN" ]; then
            printf '\n[[routes]]\npattern = "%s/*"\ncustom_domain = true\n' "$CNAME_DOMAIN" >> wrangler.toml
            echo "✅ Custom domain configured: $CNAME_DOMAIN"
          fi

          echo "--- wrangler.toml (IDs masked) ---"
          cat wrangler.toml | sed 's/database_id = ".*"/database_id = "***"/g' | sed 's/id = ".*"/id = "***"/g'

      - name: Install dependencies
        working-directory: cloudflare-backend
        run: npm install

      - name: Type check
        working-directory: cloudflare-backend
        run: npx tsc --noEmit 2>&1 || echo "::warning::TypeScript check had warnings"

      - name: Initialize D1 Schema
        working-directory: cloudflare-backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Applying schema.sql to D1..."
          npx wrangler d1 execute readzen-db --file=./schema.sql --remote
          echo "✅ D1 schema applied"

      - name: Set Worker Secrets
        working-directory: cloudflare-backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          JWT_SECRET_VAL: ${{ secrets.JWT_SECRET }}
          SECRET_KEY_VAL: ${{ secrets.SECRET_KEY }}
          STRIPE_KEY_VAL: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WH_VAL: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          PAYPAL_ID_VAL: ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_SECRET_VAL: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          CORS_ORIGINS_VAL: ${{ secrets.CORS_ORIGINS }}
          RESEND_API_KEY_VAL: ${{ secrets.RESEND_API_KEY }}
          TELEGRAM_BOT_TOKEN_VAL: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_VAL: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$JWT_SECRET_VAL" ]; then
            echo "$JWT_SECRET_VAL" | npx wrangler secret put JWT_SECRET
          else
            openssl rand -hex 32 | npx wrangler secret put JWT_SECRET
          fi
          if [ -n "$SECRET_KEY_VAL" ]; then
            echo "$SECRET_KEY_VAL" | npx wrangler secret put SECRET_KEY
          else
            openssl rand -hex 32 | npx wrangler secret put SECRET_KEY
          fi
          CORS_VAL="${CORS_ORIGINS_VAL:-https://web.heiqiba.com,https://readzen-api.iilove.workers.dev}"
          echo "$CORS_VAL" | npx wrangler secret put CORS_ORIGINS
          if [ -n "$STRIPE_KEY_VAL" ]; then
            echo "$STRIPE_KEY_VAL" | npx wrangler secret put STRIPE_SECRET_KEY
          fi
          if [ -n "$STRIPE_WH_VAL" ]; then
            echo "$STRIPE_WH_VAL" | npx wrangler secret put STRIPE_WEBHOOK_SECRET
          fi
          if [ -n "$PAYPAL_ID_VAL" ]; then
            echo "$PAYPAL_ID_VAL" | npx wrangler secret put PAYPAL_CLIENT_ID
          fi
          if [ -n "$PAYPAL_SECRET_VAL" ]; then
            echo "$PAYPAL_SECRET_VAL" | npx wrangler secret put PAYPAL_CLIENT_SECRET
          fi
          if [ -n "$RESEND_API_KEY_VAL" ]; then
            echo "$RESEND_API_KEY_VAL" | npx wrangler secret put RESEND_API_KEY
          fi
          if [ -n "$TELEGRAM_BOT_TOKEN_VAL" ]; then
            echo "$TELEGRAM_BOT_TOKEN_VAL" | npx wrangler secret put TELEGRAM_BOT_TOKEN
          fi
          if [ -n "$TELEGRAM_CHAT_ID_VAL" ]; then
            echo "$TELEGRAM_CHAT_ID_VAL" | npx wrangler secret put TELEGRAM_CHAT_ID
          fi
          echo "✅ All secrets configured"

      - name: Deploy Worker
        working-directory: cloudflare-backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          npx wrangler deploy --minify 2>&1 | tee /tmp/deploy.log
          echo "✅ Worker deployed"

      - name: Verify Deployment
        continue-on-error: true
        env:
          CNAME_DOMAIN: ${{ secrets.CNAME_HTTPS }}
        run: |
          sleep 8
          PRIMARY_URL="https://readzen-api.iilove.workers.dev/"
          HTTP_CODE=$(curl -so /dev/null -w '%{http_code}' "$PRIMARY_URL" 2>/dev/null || echo "000")
          RESP=$(curl -sf "$PRIMARY_URL" 2>/dev/null || echo "{}")
          echo "Worker response ($HTTP_CODE): $RESP"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Worker is live: $PRIMARY_URL"
          else
            echo "::warning::Worker returned HTTP $HTTP_CODE at $PRIMARY_URL"
          fi
          if [ -n "$CNAME_DOMAIN" ]; then
            HTTP2=$(curl -so /dev/null -w '%{http_code}' "https://$CNAME_DOMAIN/" 2>/dev/null || echo "000")
            echo "Custom domain ($CNAME_DOMAIN) response: $HTTP2"
          fi
