name: Cloudflare Deploy

on:
  workflow_dispatch:
  repository_dispatch:
    types: [source-updated]

jobs:
  deploy:
    name: Provision & Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout source from readzen
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Verify Cloudflare Auth
        run: wrangler whoami

      # Use Cloudflare REST API directly — avoids wrangler CLI version issues
      - name: Provision D1 Database via API
        id: d1
        run: |
          echo "Checking for existing D1 database 'readzen-db'..."
          EXISTING=$(curl -sf \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database" \
            | jq -r '.result[] | select(.name=="readzen-db") | .uuid')

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "D1 already exists: $EXISTING"
            D1_ID="$EXISTING"
          else
            echo "Creating D1 database..."
            RESP=$(curl -sf -X POST \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"readzen-db"}' \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database")
            echo "$RESP" | jq .
            D1_ID=$(echo "$RESP" | jq -r '.result.uuid')
          fi

          if [ -z "$D1_ID" ] || [ "$D1_ID" = "null" ]; then
            echo "::error::Failed to get D1 database ID"
            exit 1
          fi

          echo "d1_id=$D1_ID" >> $GITHUB_OUTPUT
          echo "✅ D1 Database ID: $D1_ID"

      - name: Provision KV Namespace via API
        id: kv
        run: |
          echo "Checking for existing KV namespace 'READZEN_KV'..."
          EXISTING=$(curl -sf \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces" \
            | jq -r '.result[] | select(.title=="READZEN_KV") | .id')

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "KV already exists: $EXISTING"
            KV_ID="$EXISTING"
          else
            echo "Creating KV namespace..."
            RESP=$(curl -sf -X POST \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"title":"READZEN_KV"}' \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces")
            echo "$RESP" | jq .
            KV_ID=$(echo "$RESP" | jq -r '.result.id')
          fi

          if [ -z "$KV_ID" ] || [ "$KV_ID" = "null" ]; then
            echo "::error::Failed to get KV namespace ID"
            exit 1
          fi

          echo "kv_id=$KV_ID" >> $GITHUB_OUTPUT
          echo "✅ KV Namespace ID: $KV_ID"

      - name: Patch wrangler.toml with real IDs
        run: |
          cd cloudflare-backend
          D1_ID="${{ steps.d1.outputs.d1_id }}"
          KV_ID="${{ steps.kv.outputs.kv_id }}"
          echo "D1=$D1_ID  KV=$KV_ID"
          sed -i "s/YOUR_D1_DATABASE_ID/$D1_ID/g" wrangler.toml
          sed -i "s/YOUR_KV_NAMESPACE_ID/$KV_ID/g" wrangler.toml
          echo "--- patched wrangler.toml ---"
          cat wrangler.toml

      - name: Install dependencies
        working-directory: cloudflare-backend
        run: npm install

      - name: Type check
        working-directory: cloudflare-backend
        run: npx tsc --noEmit 2>&1 || echo "⚠️ Type check warnings (non-blocking)"

      - name: Deploy Worker
        working-directory: cloudflare-backend
        run: npx wrangler deploy --no-bundle=false

      - name: Initialize D1 Schema
        working-directory: cloudflare-backend
        run: |
          npx wrangler d1 execute readzen-db --file=schema.sql --remote --yes
          echo "✅ D1 schema initialized"

      - name: Set Worker Secrets
        working-directory: cloudflare-backend
        run: |
          # JWT_SECRET
          if [ -n "${{ secrets.JWT_SECRET }}" ]; then
            echo "${{ secrets.JWT_SECRET }}" | npx wrangler secret put JWT_SECRET
          else
            openssl rand -hex 32 | npx wrangler secret put JWT_SECRET
          fi
          # SECRET_KEY
          if [ -n "${{ secrets.SECRET_KEY }}" ]; then
            echo "${{ secrets.SECRET_KEY }}" | npx wrangler secret put SECRET_KEY
          else
            openssl rand -hex 32 | npx wrangler secret put SECRET_KEY
          fi
          echo "✅ Secrets configured"

      - name: Verify Deployment
        run: |
          sleep 5
          echo "Testing Worker health..."
          HTTP_CODE=$(curl -so /dev/null -w '%{http_code}' "https://readzen-api.readori.workers.dev/" || echo "000")
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Worker is live!"
            curl -s "https://readzen-api.readori.workers.dev/" | jq .
          else
            echo "⚠️ Worker returned $HTTP_CODE — may need a few minutes to propagate"
            echo "Try: curl https://readzen-api.readori.workers.dev/"
          fi
          echo ""
          echo "============================================"
          echo "🎉 Deployment pipeline complete!"
          echo "D1: ${{ steps.d1.outputs.d1_id }}"
          echo "KV: ${{ steps.kv.outputs.kv_id }}"
          echo "============================================"
