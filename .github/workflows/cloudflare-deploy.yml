name: Cloudflare Deploy

# SECURITY: Only manual trigger — prevents fork execution
on:
  workflow_dispatch:
  repository_dispatch:
    types: [source-updated]

# SECURITY: Least-privilege permissions
permissions:
  contents: read
  actions: read

# SECURITY: Prevent parallel deploys
concurrency:
  group: cloudflare-deploy
  cancel-in-progress: false

jobs:
  verify-caller:
    name: Verify Authorized Caller
    runs-on: ubuntu-latest
    steps:
      - name: Check caller permissions
        run: |
          echo "Triggered by: ${{ github.actor }}"
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "::error::Deploy only allowed from main branch"
            exit 1
          fi

  deploy:
    name: Provision & Deploy to Cloudflare Workers
    needs: verify-caller
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # SECURITY: All secrets passed via env (not direct interpolation in run:)
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout source from readzen
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Provision D1 Database via API
        id: d1
        run: |
          echo "Checking for existing D1 database 'readzen-db'..."
          EXISTING=$(curl -sf \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/d1/database" \
            | jq -r '.result[] | select(.name=="readzen-db") | .uuid')

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "D1 already exists"
            D1_ID="$EXISTING"
          else
            echo "Creating D1 database..."
            RESP=$(curl -sf -X POST \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"readzen-db"}' \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/d1/database")
            D1_ID=$(echo "$RESP" | jq -r '.result.uuid')
          fi

          if [ -z "$D1_ID" ] || [ "$D1_ID" = "null" ]; then
            echo "::error::Failed to get D1 database ID"
            exit 1
          fi

          # SECURITY: Mask the ID in logs
          echo "::add-mask::$D1_ID"
          echo "d1_id=$D1_ID" >> $GITHUB_OUTPUT
          echo "✅ D1 Database provisioned"

      - name: Provision KV Namespace via API
        id: kv
        run: |
          echo "Checking for existing KV namespace 'READZEN_KV'..."
          EXISTING=$(curl -sf \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces" \
            | jq -r '.result[] | select(.title=="READZEN_KV") | .id')

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "KV already exists"
            KV_ID="$EXISTING"
          else
            echo "Creating KV namespace..."
            RESP=$(curl -sf -X POST \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"title":"READZEN_KV"}' \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces")
            KV_ID=$(echo "$RESP" | jq -r '.result.id')
          fi

          if [ -z "$KV_ID" ] || [ "$KV_ID" = "null" ]; then
            echo "::error::Failed to get KV namespace ID"
            exit 1
          fi

          # SECURITY: Mask the ID in logs
          echo "::add-mask::$KV_ID"
          echo "kv_id=$KV_ID" >> $GITHUB_OUTPUT
          echo "✅ KV Namespace provisioned"

      - name: Patch wrangler.toml with real IDs
        run: |
          cd cloudflare-backend
          D1_ID="${{ steps.d1.outputs.d1_id }}"
          KV_ID="${{ steps.kv.outputs.kv_id }}"
          sed -i "s/YOUR_D1_DATABASE_ID/$D1_ID/g" wrangler.toml
          sed -i "s/YOUR_KV_NAMESPACE_ID/$KV_ID/g" wrangler.toml
          echo "✅ wrangler.toml patched"

      - name: Install dependencies
        working-directory: cloudflare-backend
        run: npm install

      - name: Type check
        working-directory: cloudflare-backend
        run: npx tsc --noEmit 2>&1 || echo "⚠️ Type check warnings (non-blocking)"

      - name: Deploy Worker
        working-directory: cloudflare-backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Deploying readzen-api worker..."
          npx wrangler deploy 2>&1
          echo "✅ Worker deployed"

      - name: Initialize D1 Schema
        working-directory: cloudflare-backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute readzen-db --file=schema.sql --remote --yes 2>&1 || echo "⚠️ Schema may already exist"
          echo "✅ D1 schema initialized"

      - name: Set Worker Secrets
        working-directory: cloudflare-backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          JWT_SECRET_VAL: ${{ secrets.JWT_SECRET }}
          SECRET_KEY_VAL: ${{ secrets.SECRET_KEY }}
        run: |
          # SECURITY: Pass secrets via env vars, never interpolate directly in shell
          if [ -n "$JWT_SECRET_VAL" ]; then
            echo "$JWT_SECRET_VAL" | npx wrangler secret put JWT_SECRET 2>&1
          else
            openssl rand -hex 32 | npx wrangler secret put JWT_SECRET 2>&1
          fi
          if [ -n "$SECRET_KEY_VAL" ]; then
            echo "$SECRET_KEY_VAL" | npx wrangler secret put SECRET_KEY 2>&1
          else
            openssl rand -hex 32 | npx wrangler secret put SECRET_KEY 2>&1
          fi
          echo "✅ Secrets configured"

      - name: Verify Deployment
        run: |
          sleep 8
          echo "Testing Worker health..."
          HTTP_CODE=$(curl -so /dev/null -w '%{http_code}' "https://readzen-api.readori.workers.dev/" 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Worker is live!"
          elif [ "$HTTP_CODE" = "000" ]; then
            echo "⚠️ Worker URL not yet available — first deploy may take a minute"
          else
            echo "⚠️ Worker returned $HTTP_CODE"
          fi
          echo "✅ Deployment pipeline complete"
