name: Cloudflare Deploy

on:
  workflow_dispatch:
  repository_dispatch:
    types: [source-updated]

jobs:
  deploy:
    name: Provision & Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout source from readzen
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler v4
        run: npm install -g wrangler@4

      - name: Verify Cloudflare Auth
        run: wrangler whoami

      - name: Provision D1 Database
        id: d1
        run: |
          echo "Checking D1 databases..."
          D1_ID=$(wrangler d1 list --json 2>/dev/null | jq -r '.[] | select(.name=="readzen-db") | .uuid' || echo "")

          if [ -z "$D1_ID" ] || [ "$D1_ID" = "null" ]; then
            echo "Creating D1 database 'readzen-db'..."
            OUTPUT=$(wrangler d1 create readzen-db 2>&1)
            echo "$OUTPUT"
            D1_ID=$(echo "$OUTPUT" | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          fi

          echo "✅ D1 Database ID: $D1_ID"
          echo "d1_id=$D1_ID" >> $GITHUB_OUTPUT

      - name: Provision KV Namespace
        id: kv
        run: |
          echo "Checking KV namespaces..."
          KV_ID=$(wrangler kv namespace list --json 2>/dev/null | jq -r '.[] | select(.title | test("READZEN_KV")) | .id' || echo "")

          if [ -z "$KV_ID" ] || [ "$KV_ID" = "null" ]; then
            echo "Creating KV namespace 'READZEN_KV'..."
            OUTPUT=$(wrangler kv namespace create READZEN_KV 2>&1)
            echo "$OUTPUT"
            KV_ID=$(echo "$OUTPUT" | grep -oP 'id\s*=\s*"\K[^"]+' || echo "")
            if [ -z "$KV_ID" ]; then
              KV_ID=$(echo "$OUTPUT" | grep -oP '[0-9a-f]{32}' | head -1)
            fi
          fi

          echo "✅ KV Namespace ID: $KV_ID"
          echo "kv_id=$KV_ID" >> $GITHUB_OUTPUT

      - name: Patch wrangler.toml with real IDs
        run: |
          cd cloudflare-backend
          echo "Patching wrangler.toml..."
          sed -i 's/YOUR_D1_DATABASE_ID/${{ steps.d1.outputs.d1_id }}/g' wrangler.toml
          sed -i 's/YOUR_KV_NAMESPACE_ID/${{ steps.kv.outputs.kv_id }}/g' wrangler.toml
          echo "--- wrangler.toml ---"
          cat wrangler.toml
          echo "---"

      - name: Install dependencies
        working-directory: cloudflare-backend
        run: npm install

      - name: Type check
        working-directory: cloudflare-backend
        run: npx tsc --noEmit || echo "⚠️ Type check warnings (non-blocking)"

      - name: Deploy Worker
        working-directory: cloudflare-backend
        run: npx wrangler deploy

      - name: Initialize D1 Schema (idempotent)
        working-directory: cloudflare-backend
        run: |
          echo "Running D1 schema migration..."
          npx wrangler d1 execute readzen-db --file=schema.sql --remote
          echo "✅ D1 schema initialized"

      - name: Set JWT Secret
        working-directory: cloudflare-backend
        run: |
          if [ -n "${{ secrets.JWT_SECRET }}" ]; then
            echo "${{ secrets.JWT_SECRET }}" | npx wrangler secret put JWT_SECRET
          else
            JWT=$(openssl rand -hex 32)
            echo "$JWT" | npx wrangler secret put JWT_SECRET
            echo "⚠️ Auto-generated JWT_SECRET. Add it as a GitHub secret for consistency."
          fi
          echo "✅ JWT_SECRET configured"

      - name: Set SECRET_KEY
        working-directory: cloudflare-backend
        run: |
          if [ -n "${{ secrets.SECRET_KEY }}" ]; then
            echo "${{ secrets.SECRET_KEY }}" | npx wrangler secret put SECRET_KEY
          else
            SK=$(openssl rand -hex 32)
            echo "$SK" | npx wrangler secret put SECRET_KEY
          fi
          echo "✅ SECRET_KEY configured"

      - name: Verify Deployment
        run: |
          echo "Waiting for Worker to propagate..."
          sleep 10
          WORKER_URL=$(npx wrangler deployments list --json 2>/dev/null | jq -r '.[0].url // empty' || echo "")
          if [ -z "$WORKER_URL" ]; then
            WORKER_URL="https://readzen-api.$(echo $CLOUDFLARE_ACCOUNT_ID | head -c 8).workers.dev"
          fi
          echo "Testing health endpoint..."
          curl -sf "https://readzen-api.readori.workers.dev/" || curl -sf "https://readzen-api.*.workers.dev/" || echo "⚠️ Health check pending — Worker may need a few minutes to propagate"
          echo ""
          echo "============================================"
          echo "🎉 Deployment Complete!"
          echo "============================================"
          echo "D1 Database: ${{ steps.d1.outputs.d1_id }}"
          echo "KV Namespace: ${{ steps.kv.outputs.kv_id }}"
          echo "============================================"
