name: Initialize Keystore

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'TRIGGER_KEYSTORE'

permissions:
  contents: read
  actions: write

jobs:
  generate-keystore:
    name: Generate & Store Keystore
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate stable keystore
        run: |
          keytool -genkeypair \
            -alias readzen-debug \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -keystore readzen-ci.keystore \
            -storepass readzen2024 -keypass readzen2024 \
            -dname "CN=ReadZen CI, OU=Dev, O=ReadZen, L=SF, ST=CA, C=US"
          echo "✅ Keystore generated (alias: readzen-debug)"
          ls -la readzen-ci.keystore
          keytool -list -keystore readzen-ci.keystore -storepass readzen2024

      - name: Store keystore as secret
        env:
          GH_TOKEN: ${{ secrets.READZEN_PAT }}
          GH_FALLBACK_TOKEN: ${{ github.token }}
        run: |
          BASE64=$(base64 -w 0 readzen-ci.keystore)
          echo "Keystore base64 length: ${#BASE64}"

          # Prefer PAT, fallback to workflow token.
          if [ -n "$GH_TOKEN" ]; then
            echo "Using READZEN_PAT to set secret..."
            if gh secret set CI_KEYSTORE_BASE64 --repo readori/readzen-ci --body "$BASE64"; then
              echo "✅ Secret CI_KEYSTORE_BASE64 stored successfully with READZEN_PAT"
              echo "Alias: readzen-debug | Store pass: readzen2024 | Key pass: readzen2024"
              exit 0
            fi
            echo "⚠️ READZEN_PAT failed, trying GITHUB_TOKEN fallback..."
          fi

          export GH_TOKEN="$GH_FALLBACK_TOKEN"
          if gh secret set CI_KEYSTORE_BASE64 --repo readori/readzen-ci --body "$BASE64"; then
            echo "✅ Secret CI_KEYSTORE_BASE64 stored successfully with GITHUB_TOKEN"
            echo "Alias: readzen-debug | Store pass: readzen2024 | Key pass: readzen2024"
            exit 0
          fi

          echo "❌ Failed to set CI_KEYSTORE_BASE64 via both tokens."
          echo "Required token permissions for readori/readzen-ci:"
          echo "- Repository Actions secrets: Write"
          echo "- Repository contents: Read"
          echo "If using classic PAT, include 'repo' scope."
          echo "If using fine-grained PAT, grant repository permission 'Secrets: Read and write'."
          exit 1
