name: Initialize Keystore

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'TRIGGER_KEYSTORE'

permissions:
  contents: read

jobs:
  generate-keystore:
    name: Generate & Store Keystore
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate stable keystore
        run: |
          keytool -genkeypair \
            -alias readzen-debug \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -keystore readzen-ci.keystore \
            -storepass readzen2024 -keypass readzen2024 \
            -dname "CN=ReadZen CI, OU=Dev, O=ReadZen, L=SF, ST=CA, C=US"
          echo "✅ Keystore generated (alias: readzen-debug)"
          ls -la readzen-ci.keystore
          keytool -list -keystore readzen-ci.keystore -storepass readzen2024

      - name: Store keystore as secret
        env:
          GH_TOKEN: ${{ secrets.READZEN_PAT }}
        run: |
          BASE64=$(base64 -w 0 readzen-ci.keystore)
          echo "Keystore base64 length: ${#BASE64}"
          gh secret set CI_KEYSTORE_BASE64 --repo readori/readzen-ci --body "$BASE64"
          echo "✅ Secret CI_KEYSTORE_BASE64 stored successfully"
          echo "Alias: readzen-debug | Store pass: readzen2024 | Key pass: readzen2024"
