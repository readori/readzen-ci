name: Initialize Keystore

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'TRIGGER_KEYSTORE'

permissions:
  contents: read
  actions: read

jobs:
  generate-keystore:
    name: Generate Keystore Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate stable keystore
        run: |
          keytool -genkeypair \
            -alias readzen-debug \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -keystore readzen-ci.keystore \
            -storepass readzen2024 -keypass readzen2024 \
            -dname "CN=ReadZen CI, OU=Dev, O=ReadZen, L=SF, ST=CA, C=US"

          echo "✅ Keystore generated (alias: readzen-debug)"
          ls -la readzen-ci.keystore
          keytool -list -keystore readzen-ci.keystore -storepass readzen2024

          BASE64=$(base64 -w 0 readzen-ci.keystore)
          echo "Keystore base64 length: ${#BASE64}"

      - name: Upload keystore artifact (backup/manual secret setup)
        uses: actions/upload-artifact@v4
        with:
          name: readzen-ci-keystore
          path: readzen-ci.keystore
          retention-days: 30

      - name: Output manual setup note
        run: |
          echo "ℹ️ This workflow no longer calls GitHub Secrets API (avoids 403 token issues)."
          echo "ℹ️ Android build workflow now supports secret -> cached keystore -> generated keystore fallback."
