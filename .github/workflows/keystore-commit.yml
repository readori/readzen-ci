name: Keystore Commit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'TRIGGER_KEYSTORE_COMMIT'

jobs:
  commit-keystore:
    name: Generate & Commit Keystore to readzen
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check if keystore already exists in readzen
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.READZEN_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/readori/readzen/contents/android/keystore/readzen.keystore.b64")
          echo "Keystore check status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Java for keytool
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate stable keystore
        if: steps.check.outputs.exists == 'false'
        run: |
          keytool -genkeypair \
            -alias readzen-release \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -keystore /tmp/readzen.keystore \
            -storepass readzen2024 \
            -keypass readzen2024 \
            -dname "CN=ReadZen CI, OU=Dev, O=ReadZen, L=SF, ST=CA, C=US" \
            -noprompt
          ls -la /tmp/readzen.keystore
          echo "Keystore generated OK"

      - name: Commit keystore via GitHub API (Python)
        if: steps.check.outputs.exists == 'false'
        env:
          READZEN_PAT: ${{ secrets.READZEN_PAT }}
        run: |
          python3 << 'EOF'
          import json, base64, urllib.request, urllib.error, os, sys

          pat = os.environ.get("READZEN_PAT", "")
          if not pat:
              print("ERROR: READZEN_PAT is empty!")
              sys.exit(1)
          print(f"PAT length: {len(pat)} chars")

          # Read keystore binary and base64-encode it (this is the file content to store)
          with open("/tmp/readzen.keystore", "rb") as f:
              keystore_bytes = f.read()
          print(f"Keystore size: {len(keystore_bytes)} bytes")

          # File content = base64 of binary keystore
          file_content_str = base64.b64encode(keystore_bytes).decode("utf-8")
          # GitHub API content field = base64 of file content (text)
          api_content = base64.b64encode(file_content_str.encode("utf-8")).decode("utf-8")

          url = "https://api.github.com/repos/readori/readzen/contents/android/keystore/readzen.keystore.b64"
          payload = {
              "message": "ci: commit stable keystore (alias: readzen-release, RSA 2048, valid 100yr)",
              "content": api_content
          }

          req = urllib.request.Request(url, data=json.dumps(payload).encode(), method="PUT")
          req.add_header("Authorization", f"token {pat}")
          req.add_header("Accept", "application/vnd.github.v3+json")
          req.add_header("Content-Type", "application/json")

          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
                  html_url = result.get("content", {}).get("html_url", "committed")
                  print(f"SUCCESS: {html_url}")
          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8")
              print(f"HTTP ERROR {e.code}: {body[:500]}")
              sys.exit(1)
          except Exception as ex:
              print(f"ERROR: {ex}")
              sys.exit(1)
          EOF

      - name: Verify keystore in readzen
        if: steps.check.outputs.exists == 'false'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.READZEN_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/readori/readzen/contents/android/keystore/readzen.keystore.b64")
          echo "Verify status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "DONE: Keystore is committed to readzen"
          else
            echo "WARN: Keystore not visible (HTTP $STATUS)"
          fi
