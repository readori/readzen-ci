name: Keystore Commit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'TRIGGER_KEYSTORE_COMMIT'

permissions:
  contents: write

jobs:
  commit-keystore:
    name: Generate & Commit Keystore to readzen
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout readzen
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}
          persist-credentials: true
          path: readzen

      - name: Check if keystore already exists
        id: check
        run: |
          if [ -f "readzen/android/keystore/readzen.keystore.b64" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Keystore already committed — nothing to do."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No keystore found; generating..."
          fi

      - name: Generate stable keystore
        if: steps.check.outputs.exists == 'false'
        run: |
          keytool -genkeypair \
            -alias readzen-release \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -keystore /tmp/readzen.keystore \
            -storepass readzen2024 \
            -keypass readzen2024 \
            -dname "CN=ReadZen CI, OU=Dev, O=ReadZen, L=SF, ST=CA, C=US"

          echo "✅ Keystore generated"
          ls -la /tmp/readzen.keystore
          keytool -list -keystore /tmp/readzen.keystore -storepass readzen2024

          # Encode to base64 single line
          base64 -w 0 /tmp/readzen.keystore > /tmp/readzen.keystore.b64
          echo ""
          echo "Base64 length: $(wc -c < /tmp/readzen.keystore.b64)"

      - name: Commit keystore to readzen repo
        if: steps.check.outputs.exists == 'false'
        working-directory: readzen
        run: |
          mkdir -p android/keystore
          cp /tmp/readzen.keystore.b64 android/keystore/readzen.keystore.b64

          git config user.email "ci@readzen.app"
          git config user.name "ReadZen CI"

          git add android/keystore/readzen.keystore.b64
          git commit -m "ci: commit stable keystore for consistent APK signing

Keystore details:
  alias: readzen-release
  validity: 100 years
  algorithm: RSA 2048
  storepass: readzen2024
  keypass: readzen2024

This file is intentionally committed to ensure every CI build
uses the same signing certificate, allowing direct upgrade installs
without uninstall. Do NOT regenerate unless you fully uninstall
all existing APKs first."

          git push origin main
          echo "✅ Keystore committed to readzen repo"

      - name: Done
        run: |
          echo "✅ Keystore is in readzen/android/keystore/readzen.keystore.b64"
          echo "Android build workflow now reads keystore from repo file."
          echo "Alias: readzen-release | storepass: readzen2024 | keypass: readzen2024"
