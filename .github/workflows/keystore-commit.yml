name: Keystore Commit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'TRIGGER_KEYSTORE_COMMIT'

jobs:
  commit-keystore:
    name: Generate & Commit Keystore to readzen
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set up Java for keytool
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -alias readzen-release \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -keystore /tmp/readzen.keystore \
            -storepass readzen2024 \
            -keypass readzen2024 \
            -dname "CN=ReadZen CI, OU=Dev, O=ReadZen, L=SF, ST=CA, C=US" \
            -noprompt
          echo "Generated: $(ls -la /tmp/readzen.keystore)"

      - name: Debug - test PAT access
        env:
          PAT: ${{ secrets.READZEN_PAT }}
        run: |
          echo "PAT set: $([ -n "$PAT" ] && echo YES || echo NO)"
          echo "PAT length: ${#PAT}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $PAT" \
            "https://api.github.com/repos/readori/readzen")
          echo "readzen repo access HTTP: $STATUS"
          STATUS2=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $PAT" \
            "https://api.github.com/user")
          echo "user auth check HTTP: $STATUS2"

      - name: Commit keystore via Python
        env:
          PAT: ${{ secrets.READZEN_PAT }}
        run: |
          python3 -c "
          import json, base64, urllib.request, urllib.error, os, sys

          pat = os.environ.get('PAT', '')
          print(f'PAT length: {len(pat)}')
          if not pat:
              print('ERROR: PAT is empty')
              sys.exit(1)

          with open('/tmp/readzen.keystore', 'rb') as f:
              keystore_bytes = f.read()
          print(f'Keystore size: {len(keystore_bytes)} bytes')

          # file stores base64 of binary; API needs base64 of file content
          file_content = base64.b64encode(keystore_bytes).decode('utf-8')
          api_content = base64.b64encode(file_content.encode('utf-8')).decode('utf-8')

          url = 'https://api.github.com/repos/readori/readzen/contents/android/keystore/readzen.keystore.b64'
          payload = json.dumps({'message': 'ci: commit stable keystore (alias: readzen-release, RSA 2048)', 'content': api_content}).encode()

          req = urllib.request.Request(url, data=payload, method='PUT')
          req.add_header('Authorization', f'token {pat}')
          req.add_header('Accept', 'application/vnd.github.v3+json')
          req.add_header('Content-Type', 'application/json')

          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
                  print('SUCCESS: ' + result.get('content', {}).get('html_url', 'ok'))
          except urllib.error.HTTPError as e:
              body = e.read().decode('utf-8', errors='replace')
              print(f'HTTP ERROR {e.code}: {body[:1000]}')
              sys.exit(1)
          "
