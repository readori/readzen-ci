name: Keystore Commit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'TRIGGER_KEYSTORE_COMMIT'

jobs:
  commit-keystore:
    name: Generate & Commit Keystore to readzen
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check if keystore already exists in readzen
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.READZEN_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/readori/readzen/contents/android/keystore/readzen.keystore.b64")

          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Keystore already committed — skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No keystore found (HTTP $STATUS) — generating..."
          fi

      - name: Set up Java for keytool
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate stable keystore
        if: steps.check.outputs.exists == 'false'
        run: |
          keytool -genkeypair \
            -alias readzen-release \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -keystore /tmp/readzen.keystore \
            -storepass readzen2024 \
            -keypass readzen2024 \
            -dname "CN=ReadZen CI, OU=Dev, O=ReadZen, L=SF, ST=CA, C=US" \
            -noprompt

          ls -la /tmp/readzen.keystore
          keytool -list -keystore /tmp/readzen.keystore -storepass readzen2024

          base64 -w 0 /tmp/readzen.keystore > /tmp/readzen.keystore.b64
          echo "Base64 length: $(wc -c < /tmp/readzen.keystore.b64)"

      - name: Commit keystore via GitHub API
        if: steps.check.outputs.exists == 'false'
        run: |
          # Encode content for JSON (GitHub API requires base64 content)
          CONTENT=$(cat /tmp/readzen.keystore.b64)
          # The content itself is already base64, but API needs it re-encoded as JSON-safe base64
          ENCODED=$(base64 -w 0 /tmp/readzen.keystore)

          # Build the JSON payload
          JSON=$(jq -n \
            --arg message "ci: commit stable keystore (alias: readzen-release, RSA 2048, valid 100yr)" \
            --arg content "$ENCODED" \
            '{message: $message, content: $content}')

          # Call GitHub API to create the file
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PUT \
            -H "Authorization: token ${{ secrets.READZEN_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d "$JSON" \
            "https://api.github.com/repos/readori/readzen/contents/android/keystore/readzen.keystore.b64")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "Keystore committed successfully to readzen/android/keystore/readzen.keystore.b64"
          else
            echo "ERROR: GitHub API returned $HTTP_CODE"
            echo "$BODY" | jq .
            exit 1
          fi

      - name: Summary
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.READZEN_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/readori/readzen/contents/android/keystore/readzen.keystore.b64")
          echo "Keystore file status in readzen: HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "SUCCESS: Keystore is available at android/keystore/readzen.keystore.b64"
            echo "Next: trigger Android Build in readzen-ci for stable-signed APKs"
          else
            echo "FAIL: Keystore not found (HTTP $STATUS)"
            exit 1
          fi
