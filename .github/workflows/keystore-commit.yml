name: Keystore Commit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'TRIGGER_KEYSTORE_COMMIT'

jobs:
  commit-keystore:
    name: Generate & Commit Keystore to readzen
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set up Java for keytool
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -alias readzen-release \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -keystore /tmp/readzen.keystore \
            -storepass readzen2024 \
            -keypass readzen2024 \
            -dname "CN=ReadZen CI, OU=Dev, O=ReadZen, L=SF, ST=CA, C=US" \
            -noprompt
          ls -la /tmp/readzen.keystore
          echo "Keystore generated OK"

      - name: Commit keystore via GitHub API
        env:
          READZEN_PAT: ${{ secrets.READZEN_PAT }}
        run: |
          cat > /tmp/commit_keystore.py << 'PYEOF'
          import json, base64, urllib.request, urllib.error, os, sys

          pat = os.environ.get("READZEN_PAT", "")
          print("PAT length:", len(pat))
          if not pat:
              print("ERROR: READZEN_PAT env var is empty")
              sys.exit(1)

          with open("/tmp/readzen.keystore", "rb") as f:
              keystore_bytes = f.read()
          print("Keystore size:", len(keystore_bytes), "bytes")

          file_content_b64 = base64.b64encode(keystore_bytes).decode("utf-8")
          api_content = base64.b64encode(file_content_b64.encode("utf-8")).decode("utf-8")

          url = "https://api.github.com/repos/readori/readzen/contents/android/keystore/readzen.keystore.b64"
          payload = json.dumps({
              "message": "ci: commit stable keystore (readzen-release, RSA2048)",
              "content": api_content
          }).encode("utf-8")

          req = urllib.request.Request(url, data=payload, method="PUT")
          req.add_header("Authorization", "token " + pat)
          req.add_header("Accept", "application/vnd.github.v3+json")
          req.add_header("Content-Type", "application/json")

          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
                  print("SUCCESS:", result.get("content", {}).get("html_url", "committed"))
          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", errors="replace")
              print("HTTP ERROR", e.code, ":", body[:2000])
              sys.exit(1)
          except Exception as ex:
              print("ERROR:", str(ex))
              sys.exit(1)
          PYEOF

          python3 /tmp/commit_keystore.py
