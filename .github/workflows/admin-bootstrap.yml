name: Admin Bootstrap & Payment Setup

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'bootstrap-admin'
        type: choice
        options:
          - bootstrap-admin
          - update-payment-secrets
          - verify-all-endpoints
      admin_email:
        description: 'Admin email (for bootstrap)'
        required: false
        default: 'admin@readzen.app'
      admin_password:
        description: 'Admin password (for bootstrap)'
        required: false
        default: ''

permissions:
  contents: read
  issues: write

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  admin-setup:
    name: Admin Setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: readori/readzen
          token: ${{ secrets.READZEN_PAT }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Generate wrangler.toml
        working-directory: cloudflare-backend
        run: |
          D1_ID="43298902-b2fa-4ae5-af86-c781226abd22"
          KV_ID="0a4bbbf370b8451394ef3c7d48abbd8f"
          echo 'name = "readzen-api"' > wrangler.toml
          echo 'main = "src/index.ts"' >> wrangler.toml
          echo 'compatibility_date = "2024-12-01"' >> wrangler.toml
          echo 'compatibility_flags = ["nodejs_compat"]' >> wrangler.toml
          echo 'workers_dev = true' >> wrangler.toml
          echo '' >> wrangler.toml
          echo '[[d1_databases]]' >> wrangler.toml
          echo 'binding = "DB"' >> wrangler.toml
          echo 'database_name = "readzen-db"' >> wrangler.toml
          echo "database_id = \"${D1_ID}\"" >> wrangler.toml
          echo '' >> wrangler.toml
          echo '[[kv_namespaces]]' >> wrangler.toml
          echo 'binding = "KV"' >> wrangler.toml
          echo "id = \"${KV_ID}\"" >> wrangler.toml

      - name: Bootstrap Admin
        if: inputs.action == 'bootstrap-admin'
        working-directory: cloudflare-backend
        env:
          ADMIN_EMAIL: ${{ inputs.admin_email }}
          ADMIN_PASSWORD: ${{ inputs.admin_password }}
        run: |
          echo "=== Admin Bootstrap ==="

          # Generate a new SECRET_KEY and set it
          NEW_SECRET_KEY=$(openssl rand -hex 24)
          echo "$NEW_SECRET_KEY" | wrangler secret put SECRET_KEY
          echo "✅ SECRET_KEY updated"

          # Wait for secret propagation
          sleep 5

          # Generate password if not provided
          if [ -z "$ADMIN_PASSWORD" ]; then
            ADMIN_PASSWORD=$(openssl rand -base64 16)
            echo "Generated password (no input provided)"
          fi

          WORKER_URL="https://readzen-api.iilove.workers.dev"

          echo "Calling bootstrap endpoint..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${WORKER_URL}/api/v1/admin/bootstrap" \
            -H "Content-Type: application/json" \
            -d "{\"secret_key\":\"${NEW_SECRET_KEY}\",\"email\":\"${ADMIN_EMAIL}\",\"password\":\"${ADMIN_PASSWORD}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP: $HTTP_CODE"
          echo "Response: $BODY"

          if echo "$BODY" | jq -e '.success' > /dev/null 2>&1; then
            echo "✅ Admin account created successfully!"
            echo "## 🔐 Admin Credentials" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Email | \`${ADMIN_EMAIL}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Password | \`${ADMIN_PASSWORD}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Admin Panel | https://readzen-api.iilove.workers.dev/admin |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Save these credentials!** They cannot be recovered." >> $GITHUB_STEP_SUMMARY
          elif echo "$BODY" | grep -q "already exists"; then
            echo "ℹ️ Admin already exists. Use admin panel to manage accounts."
            echo "## ℹ️ Admin Already Exists" >> $GITHUB_STEP_SUMMARY
            echo "An admin account already exists. Login at:" >> $GITHUB_STEP_SUMMARY
            echo "https://readzen-api.iilove.workers.dev/admin" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Bootstrap failed: $BODY"
            echo "## ❌ Bootstrap Failed" >> $GITHUB_STEP_SUMMARY
            echo "Error: \`$BODY\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Update Payment Secrets
        if: inputs.action == 'update-payment-secrets'
        working-directory: cloudflare-backend
        env:
          STRIPE_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WH: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          PP_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PP_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
        run: |
          echo "=== Updating Payment Secrets ==="
          CONFIGURED=0

          if [ -n "$STRIPE_KEY" ]; then
            echo "$STRIPE_KEY" | wrangler secret put STRIPE_SECRET_KEY
            echo "✅ STRIPE_SECRET_KEY configured"
            CONFIGURED=$((CONFIGURED+1))
          else
            echo "⚠️ STRIPE_SECRET_KEY not set in repo secrets"
          fi

          if [ -n "$STRIPE_WH" ]; then
            echo "$STRIPE_WH" | wrangler secret put STRIPE_WEBHOOK_SECRET
            echo "✅ STRIPE_WEBHOOK_SECRET configured"
            CONFIGURED=$((CONFIGURED+1))
          else
            echo "⚠️ STRIPE_WEBHOOK_SECRET not set"
          fi

          if [ -n "$PP_ID" ]; then
            echo "$PP_ID" | wrangler secret put PAYPAL_CLIENT_ID
            echo "✅ PAYPAL_CLIENT_ID configured"
            CONFIGURED=$((CONFIGURED+1))
          else
            echo "⚠️ PAYPAL_CLIENT_ID not set"
          fi

          if [ -n "$PP_SECRET" ]; then
            echo "$PP_SECRET" | wrangler secret put PAYPAL_CLIENT_SECRET
            echo "✅ PAYPAL_CLIENT_SECRET configured"
            CONFIGURED=$((CONFIGURED+1))
          else
            echo "⚠️ PAYPAL_CLIENT_SECRET not set"
          fi

          echo ""
          echo "## 💳 Payment Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Configured $CONFIGURED payment secrets." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stripe Webhook URL" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "https://readzen-api.iilove.workers.dev/api/v1/payment/stripe/webhook" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Setup Instructions" >> $GITHUB_STEP_SUMMARY
          echo "1. **Stripe**: Add webhook URL above in Stripe Dashboard → Developers → Webhooks" >> $GITHUB_STEP_SUMMARY
          echo "2. **PayPal**: Configure webhook at PayPal Developer Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "3. **Google Play**: No additional secrets needed (verify via purchase token)" >> $GITHUB_STEP_SUMMARY

          if [ "$CONFIGURED" -eq 0 ]; then
            echo ""
            echo "### Required Secrets in readzen-ci:"
            echo "| Secret | Purpose |"
            echo "|---|---|"
            echo "| STRIPE_SECRET_KEY | Stripe API secret key (sk_live_xxx or sk_test_xxx) |"
            echo "| STRIPE_WEBHOOK_SECRET | Stripe webhook endpoint secret (whsec_xxx) |"
            echo "| PAYPAL_CLIENT_ID | PayPal REST API client ID |"
            echo "| PAYPAL_CLIENT_SECRET | PayPal REST API secret |"
          fi

      - name: Verify All Endpoints
        if: inputs.action == 'verify-all-endpoints'
        run: |
          WORKER_URL="https://readzen-api.iilove.workers.dev"
          echo "=== Endpoint Verification ==="
          echo ""

          echo "## 🔍 Endpoint Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | Status | Response |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY

          # Test each endpoint
          endpoints=(
            "GET|/|Health"
            "GET|/health|Health Check"
            "GET|/api/v1/config/public|Public Config"
            "GET|/admin|Admin Panel"
          )

          ALL_PASS=true
          for ep in "${endpoints[@]}"; do
            IFS='|' read -r METHOD PATH NAME <<< "$ep"
            HTTP=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X "$METHOD" "${WORKER_URL}${PATH}")
            RESP=$(cat /tmp/resp.txt | head -c 100)
            if [ "$HTTP" = "200" ]; then
              STATUS="✅ $HTTP"
            else
              STATUS="❌ $HTTP"
              ALL_PASS=false
            fi
            echo "$NAME ($PATH): $STATUS"
            echo "| \`$METHOD $PATH\` | $STATUS | \`${RESP:0:60}\` |" >> $GITHUB_STEP_SUMMARY
          done

          # Test auth-required endpoints (should return 401)
          auth_endpoints=(
            "GET|/api/v1/admin/stats|Admin Stats (needs auth)"
            "GET|/api/v1/subscription/status|Subscription (needs auth)"
            "GET|/api/v1/orders/recent|Orders (needs auth)"
          )

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Auth-Protected Endpoints (expect 401)" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | Status | Correct? |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY

          for ep in "${auth_endpoints[@]}"; do
            IFS='|' read -r METHOD PATH NAME <<< "$ep"
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X "$METHOD" "${WORKER_URL}${PATH}")
            if [ "$HTTP" = "401" ]; then
              echo "$NAME: ✅ Returns 401 (correct)"
              echo "| \`$PATH\` | $HTTP | ✅ Correct |" >> $GITHUB_STEP_SUMMARY
            else
              echo "$NAME: ⚠️ Returns $HTTP (expected 401)"
              echo "| \`$PATH\` | $HTTP | ⚠️ Unexpected |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Test POST bootstrap (should return 403 with wrong key or 400 if admin exists)
          BOOT_HTTP=$(curl -s -o /tmp/boot.txt -w "%{http_code}" -X POST \
            "${WORKER_URL}/api/v1/admin/bootstrap" \
            -H "Content-Type: application/json" \
            -d '{"secret_key":"wrong","email":"test@test.com","password":"test"}')
          BOOT_RESP=$(cat /tmp/boot.txt)
          echo ""
          echo "Bootstrap test (wrong key): HTTP $BOOT_HTTP — $BOOT_RESP"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Bootstrap Status" >> $GITHUB_STEP_SUMMARY
          if echo "$BOOT_RESP" | grep -q "Invalid secret"; then
            echo "✅ Bootstrap protected (returns 403 for invalid key)" >> $GITHUB_STEP_SUMMARY
          elif echo "$BOOT_RESP" | grep -q "already exists"; then
            echo "✅ Admin already bootstrapped (returns 400)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Unexpected: HTTP $BOOT_HTTP — \`$BOOT_RESP\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Post report
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const action = '${{ inputs.action }}';
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const body = [
              `## ${emoji} Admin/Payment Setup — ${action}`,
              '',
              `**Status:** ${status}`,
              `**Run:** [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              '',
              'Check **Job Summary** for credentials and details.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: 'readori', repo: 'readzen-ci', issue_number: 1, body
            });
